
<style>
*{box-sizing:border-box}
.wrap{display:flex;justify-content:center;padding:.5rem 0 1rem}
.app{width:100%;max-width:520px;font-size:14px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar select{font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);flex:1;min-width:140px}
.toolbar button{font-size:13px;padding:6px 12px;white-space:nowrap}
.progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:#185FA5;border-radius:2px;transition:width .3s}
.card-area{cursor:pointer;user-select:none;margin-bottom:14px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:24px 22px 18px;min-height:260px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:border-color .15s}
.card:hover{border-color:var(--color-border-primary)}
.card.back{background:var(--color-background-secondary)}
.side-tag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:14px}
.front-word{font-size:40px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px;line-height:1.15}
.front-example{font-size:13px;color:var(--color-text-secondary);line-height:1.75;max-width:440px;font-style:italic;margin-bottom:10px}
.front-example em{font-style:normal;color:var(--color-text-primary);font-weight:500;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(24,95,165,0.4)}
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:border-color .15s,background .15s;margin-top:2px}
.speak-btn:hover{border-color:var(--color-border-primary);background:var(--color-background-secondary)}
.speak-btn.speaking{border-color:#185FA5;color:#185FA5;background:#E6F1FB}
.speak-icon{width:14px;height:14px;flex-shrink:0}
.back-en-word{font-size:22px;color:var(--color-text-primary);line-height:1.4;max-width:400px;margin-bottom:14px;font-weight:500}
.back-en-sentence{font-size:13px;color:var(--color-text-secondary);font-style:italic;line-height:1.7;max-width:420px;padding-top:12px;border-top:0.5px solid var(--color-border-tertiary)}
.counter{font-size:12px;color:var(--color-text-tertiary);margin-top:14px}
.nav{display:flex;gap:8px;margin-bottom:4px;align-items:center}
.nav button{flex:1;padding:10px;font-size:13px;font-weight:500}
.btn-play{border-color:#185FA5!important;color:#0C447C!important}
.btn-play:hover{background:#E6F1FB!important}
.btn-play.active{background:#185FA5!important;color:#fff!important;border-color:#185FA5!important}
.play-info{font-size:11px;color:var(--color-text-tertiary);text-align:center;min-height:16px;margin-top:4px}
</style>
<div class="wrap"><div class="app">
<div class="toolbar">
  <select id="deckSel" onchange="switchDeck()"></select>
  <button onclick="shuffle()">Shuffle</button>
  <button onclick="restart()">Restart</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
<div class="card-area" onclick="flip()">
  <div class="card" id="card">
    <div class="side-tag" id="sideTag">Français · Recto</div>
    <div id="frontView">
      <div class="front-word" id="fWord"></div>
      <div class="front-example" id="fExample"></div>
      <button class="speak-btn" id="speakBtn" onclick="speakCurrent(event)">
        <svg class="speak-icon" viewBox="0 0 16 16" fill="none">
          <path d="M9 2.5C9 2.5 11.5 4 11.5 8C11.5 12 9 13.5 9 13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M12 1C12 1 15 3.5 15 8C15 12.5 12 15 12 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="1" y="5.5" width="4" height="5" rx="1" fill="currentColor" opacity="0.8"/>
          <path d="M5 6L8.5 3.5V12.5L5 10" fill="currentColor" opacity="0.8"/>
        </svg>
        <span id="speakLabel">Prononcer</span>
      </button>
    </div>
    <div id="backView" style="display:none">
      <div class="back-en-word" id="bEnWord"></div>
      <div class="back-en-sentence" id="bEnSentence"></div>
    </div>
    <div class="counter" id="counter"></div>
  </div>
</div>
<div class="nav">
  <button onclick="prevCard()">← Précédent</button>
  <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ Tout jouer</button>
  <button onclick="nextCard()">Suivant →</button>
</div>
<div class="play-info" id="playInfo"></div>
</div></div>

const DECK_ALL="Tous les mots (314)";
let decks={[DECK_ALL]:Object.values(ALL).flat()};
Object.entries(ALL).forEach(([k,v])=>decks[k]=v);
let current=DECK_ALL,cards=[],idx=0,flipped=false;
let frVoice=null,playing=false,playTimer=null;
const PLAY_DELAY=2400;

function loadVoices(){
  const v=window.speechSynthesis.getVoices();
  frVoice=v.find(x=>x.lang==='fr-FR')||v.find(x=>x.lang.startsWith('fr'))||null;
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=loadVoices;loadVoices();}

function highlight(s,w){
  const e=w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  try{return s.replace(new RegExp('(?<![\\w])'+e+'(?![\\w])','gi'),m=>'<em>'+m+'</em>');}
  catch(ex){return s.replace(new RegExp(e,'gi'),m=>'<em>'+m+'</em>');}
}

function speakText(t,cb){
  if(!window.speechSynthesis){cb&&cb();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='fr-FR';u.rate=0.85;u.pitch=1.0;
  if(frVoice)u.voice=frVoice;
  u.onend=()=>{cb&&cb();};u.onerror=()=>{cb&&cb();};
  window.speechSynthesis.speak(u);
}

function speakCurrent(e){
  e&&e.stopPropagation();
  if(!cards[idx])return;
  const btn=document.getElementById('speakBtn'),lbl=document.getElementById('speakLabel');
  btn.classList.add('speaking');lbl.textContent='En cours…';
  speakText(cards[idx][0],()=>{btn.classList.remove('speaking');lbl.textContent='Prononcer';});
}

function init(){
  const sel=document.getElementById('deckSel');
  sel.innerHTML=Object.keys(decks).map(k=>`<option value="${k}">${k}${k===DECK_ALL?'':' ('+decks[k].length+')'}</option>`).join('');
  restart();
}

function switchDeck(){current=document.getElementById('deckSel').value;stopPlay();restart();}
function shuffle(){
  cards=[...(decks[current]||[])];
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  idx=0;stopPlay();showCard();
}
function restart(){cards=[...(decks[current]||[])];idx=0;stopPlay();showCard();}

function showCard(){
  if(!cards.length)return;
  flipped=false;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const c=cards[idx];
  document.getElementById('card').className='card';
  document.getElementById('sideTag').textContent='Français · Recto';
  document.getElementById('frontView').style.display='';
  document.getElementById('backView').style.display='none';
  document.getElementById('fWord').textContent=c[0];
  document.getElementById('fExample').innerHTML=highlight(c[1],c[0]);
  document.getElementById('speakLabel').textContent='Prononcer';
  document.getElementById('speakBtn').classList.remove('speaking');
  document.getElementById('counter').textContent=(idx+1)+' / '+cards.length;
  document.getElementById('prog').style.width=Math.round((idx/(cards.length-1||1))*100)+'%';
}

function flip(){
  if(!cards[idx])return;
  if(!flipped){
    flipped=true;
    window.speechSynthesis&&window.speechSynthesis.cancel();
    const c=cards[idx];
    document.getElementById('card').className='card back';
    document.getElementById('sideTag').textContent='English · Verso';
    document.getElementById('frontView').style.display='none';
    document.getElementById('backView').style.display='';
    document.getElementById('bEnWord').textContent=c[2];
    document.getElementById('bEnSentence').textContent=c[3];
  } else { showCard(); }
}

function prevCard(){stopPlay();if(idx>0){idx--;showCard();}}
function nextCard(){stopPlay();if(idx<cards.length-1){idx++;showCard();}}
function togglePlay(){if(playing){stopPlay();}else{startPlay();}}

function startPlay(){
  playing=true;
  document.getElementById('playBtn').textContent='■ Stop';
  document.getElementById('playBtn').classList.add('active');
  playStep();
}
function playStep(){
  if(!playing)return;
  showCard();
  document.getElementById('playInfo').textContent=(idx+1)+' / '+cards.length+' — '+cards[idx][0];
  speakText(cards[idx][0],()=>{
    if(!playing)return;
    playTimer=setTimeout(()=>{
      if(!playing)return;
      if(idx<cards.length-1){idx++;playStep();}
      else{stopPlay();document.getElementById('playInfo').textContent='Terminé — '+cards.length+' mots parcourus.';}
    },PLAY_DELAY);
  });
}
function stopPlay(){
  playing=false;clearTimeout(playTimer);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('playBtn').textContent='▶ Tout jouer';
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playInfo').textContent='';
}
init();
</script>
