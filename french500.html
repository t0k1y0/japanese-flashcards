<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French B2 Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px;padding:16px}
.app{max-width:600px;margin:0 auto;padding:1rem 0}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar select{font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid #c0bdb4;background:#fff;color:#1a1a18;flex:1;min-width:140px}
.toolbar button{font-size:13px;padding:6px 12px;white-space:nowrap;border-radius:8px;border:0.5px solid #c0bdb4;background:#fff;color:#1a1a18;cursor:pointer}
.toolbar button:hover{background:#f0ede8}
.progress-bar{height:4px;background:#dddad2;border-radius:2px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:#1a6b3c;border-radius:2px;transition:width .3s}
.card-area{cursor:pointer;user-select:none;margin-bottom:14px}
.card{background:#fff;border:0.5px solid #c0bdb4;border-radius:12px;padding:28px 24px 20px;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:border-color .15s}
.card:hover{border-color:#888}
.card.back{background:#f5f4f0}
.side-tag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:16px}
.front-word{font-size:52px;line-height:1.1;color:#1a1a18;margin-bottom:14px;font-weight:600}
.front-sentence{font-size:14px;color:#444;line-height:1.6;font-style:italic;max-width:500px;margin-bottom:14px}
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:0.5px solid #c0bdb4;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:border-color .15s,background .15s}
.speak-btn:hover{border-color:#888;background:#f5f4f0}
.speak-btn.speaking{border-color:#1a6b3c;color:#1a6b3c;background:#e6f4ec}
.speak-icon{width:16px;height:16px;flex-shrink:0}
.back-word{font-size:38px;line-height:1.2;color:#1a1a18;margin-bottom:10px;font-weight:600}
.back-eng-sentence{font-size:14px;color:#1a6b3c;line-height:1.6;max-width:500px;margin-bottom:6px}
.counter{font-size:12px;color:#888;margin-top:16px}
.nav{display:flex;gap:8px;margin-bottom:4px;align-items:center}
.nav button{flex:1;padding:10px;font-size:13px;font-weight:500;border-radius:8px;border:0.5px solid #c0bdb4;background:#fff;color:#1a1a18;cursor:pointer}
.nav button:hover{background:#f0ede8}
.btn-play{border-color:#1a6b3c !important;color:#125429 !important}
.btn-play:hover{background:#e6f4ec !important}
.btn-play.active{background:#1a6b3c !important;color:#fff !important;border-color:#1a6b3c !important}
.play-info{font-size:11px;color:#888;text-align:center;margin-bottom:10px;min-height:16px}
</style>
</head>
<body>
<div class="app">
<div class="toolbar">
  <select id="deckSel" onchange="switchDeck()"></select>
  <button onclick="shuffle()">Shuffle</button>
  <button onclick="restart()">Restart</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
<div class="card-area" onclick="flip()">
  <div class="card" id="card">
    <div class="side-tag" id="sideTag">French · Front</div>
    <div id="frontView">
      <div class="front-word" id="fWord"></div>
      <div class="front-sentence" id="fSentence"></div>
      <button class="speak-btn" id="speakBtn" onclick="speakCurrent(event)">
        <svg class="speak-icon" viewBox="0 0 16 16" fill="none">
          <path d="M9 2.5C9 2.5 11.5 4 11.5 8C11.5 12 9 13.5 9 13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M12 1C12 1 15 3.5 15 8C15 12.5 12 15 12 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="1" y="5.5" width="4" height="5" rx="1" fill="currentColor" opacity="0.8"/>
          <path d="M5 6L8.5 3.5V12.5L5 10" fill="currentColor" opacity="0.8"/>
        </svg>
        <span id="speakLabel">Pronounce</span>
      </button>
    </div>
    <div id="backView" style="display:none">
      <div class="back-word" id="bWord"></div>
      <div class="back-eng-sentence" id="bSentence"></div>
    </div>
    <div class="counter" id="counter"></div>
  </div>
</div>
<div class="nav">
  <button onclick="prevCard()">← Previous</button>
  <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ Play All</button>
  <button onclick="nextCard()">Next →</button>
</div>
<div class="play-info" id="playInfo"></div>
</div>

<script>
const ALL_CARDS = [["ceinture", "belt / seatbelt", "Même si vous êtes pressé par le temps, il est essentiel d’attacher votre ceinture de sécurité avant de prendre la route, car cette mesure de précaution peut faire toute la différence en cas d’accident soudain et imprévisible.", "Even if you are in a hurry, it is essential to fasten your seatbelt before getting on the road, because this precautionary measure can make all the difference in the event of a sudden and unpredictable accident."], ["digne", "worthy / dignified", "Malgré les nombreuses difficultés qu’il a rencontrées tout au long de sa carrière professionnelle, il a toujours fait preuve d’une attitude digne et respectueuse envers ses collègues et ses concurrents.", "Despite the many difficulties he has encountered throughout his professional career, he has always demonstrated a dignified and respectful attitude towards his colleagues and competitors."], ["gâcher", "to waste / to spoil / to ruin", "Ce serait vraiment dommage de gâcher une opportunité aussi exceptionnelle de travailler à l’étranger simplement parce qu’on n’a pas pris le temps de bien préparer l’entretien d’embauche.", "It would be a real shame to waste such an exceptional opportunity to work abroad simply because one hasn’t taken the time to properly prepare for the job interview."], ["prises", "sockets (electrical) / grips", "Dans cette ancienne maison de campagne, il n’y a malheureusement pas assez de prises électriques pour brancher tous nos appareils modernes en même temps sans risquer une surcharge.", "In this old country house, unfortunately there aren’t enough electrical sockets to plug in all our modern devices at the same time without risking an overload."], ["congé", "leave / holiday / time off", "Elle a finalement décidé de demander un congé sabbatique d’un an afin de voyager en Amérique latine et de se ressourcer après plusieurs années de travail particulièrement intense.", "She has finally decided to request a one-year sabbatical leave in order to travel in Latin America and recharge after several years of particularly intense work."], ["repartir", "to leave again / to start again / to resume", "Après une courte pause déjeuner bien méritée, nous sommes repartis pleins d’énergie pour terminer notre randonnée en montagne malgré la météo incertaine.", "After a well-deserved short lunch break, we set off again full of energy to finish our mountain hike despite the uncertain weather."], ["pourri", "rotten / spoiled / lousy (slang)", "Avec ce temps pourri qui persiste depuis plus d’une semaine, il devient presque impossible de profiter pleinement des vacances en extérieur comme nous l’avions prévu.", "With this lousy weather that has persisted for more than a week, it is becoming almost impossible to fully enjoy outdoor holidays as we had planned."], ["bétail", "livestock / cattle", "Les agriculteurs de cette région élèvent du bétail de manière durable tout en respectant les normes environnementales les plus strictes imposées par l’Union européenne.", "The farmers in this region raise livestock sustainably while respecting the strictest environmental standards imposed by the European Union."], ["bonté", "kindness / goodness", "C’est par pure bonté d’âme qu’il a décidé d’aider cette famille inconnue en difficulté sans rien attendre en retour, ce qui a profondément touché tout le monde.", "It is out of pure kindness of heart that he decided to help this unknown family in difficulty without expecting anything in return, which deeply touched everyone."], ["bouffer", "to eat (slang) / to devour", "Après une longue journée de travail particulièrement épuisante, on va se bouffer un bon repas bien mérité dans ce petit restaurant italien du centre-ville ?", "After a particularly exhausting long workday, shall we grab a well-deserved good meal in that little Italian restaurant downtown?"], ["guérir", "to heal / to cure", "Le temps, combiné au soutien constant de ses proches, l’a aidé à guérir progressivement de ses blessures émotionnelles après cette rupture difficile et inattendue.", "Time, combined with the constant support of his loved ones, helped him gradually heal from his emotional wounds after this difficult and unexpected breakup."], ["coule", "flows / sinks (from couler)", "La rivière coule paisiblement à travers la vallée verdoyante, offrant un paysage magnifique aux randonneurs qui passent par là chaque été.", "The river flows peacefully through the lush green valley, offering a magnificent landscape to the hikers who pass through every summer."], ["enlevez", "remove / take off (imperative)", "Enlevez vos chaussures avant d’entrer dans le temple, comme le veut la tradition locale qui est respectée par tous les visiteurs sans exception.", "Remove your shoes before entering the temple, as required by the local tradition that is respected by all visitors without exception."], ["piqué", "stung / pricked / stolen (slang)", "Il s’est fait piquer son portefeuille par un pickpocket particulièrement habile dans le métro bondé pendant l’heure de pointe du matin.", "He had his wallet stolen by a particularly skilled pickpocket on the crowded subway during the morning rush hour."], ["remise", "discount / delivery / shed / postponement", "Le magasin nous a accordé une remise importante sur l’achat, ce qui a rendu l’acquisition de la nouvelle voiture bien plus abordable que prévu.", "The store gave us a significant discount on the purchase, which made acquiring the new car much more affordable than expected."], ["sou", "cent / penny (informal money)", "Après avoir tout dépensé lors de ses vacances en Grèce, il n’avait plus un sou en poche et devait faire très attention à ses moindres dépenses quotidiennes.", "After spending everything on his holidays in Greece, he didn’t have a penny left in his pocket and had to be very careful with his smallest daily expenses."], ["abattre", "to slaughter / to shoot down / to demolish / to exhaust", "Les autorités ont dû abattre plusieurs arbres malades afin de protéger la forêt tout entière des parasites qui se propageaient à une vitesse alarmante.", "The authorities had to cut down several diseased trees in order to protect the entire forest from parasites that were spreading at an alarming rate."], ["dégâts", "damage / harm", "L’orage violent de la nuit dernière a causé d’importants dégâts matériels dans plusieurs villages de la région côtière, obligeant les habitants à tout reconstruire.", "Last night’s violent storm caused significant material damage in several villages in the coastal region, forcing the residents to rebuild everything."], ["serré", "tight / close / squeezed", "Ce pantalon est devenu un peu trop serré depuis que j’ai pris quelques kilos pendant les fêtes de fin d’année, ce qui me gêne beaucoup au quotidien.", "These trousers have become a little too tight since I put on a few kilos during the end-of-year festivities, which bothers me a lot on a daily basis."], ["merveille", "wonder / marvel", "La cathédrale de Notre-Dame reste une véritable merveille architecturale qui attire des millions de visiteurs du monde entier chaque année malgré les récents travaux.", "Notre-Dame Cathedral remains a true architectural marvel that attracts millions of visitors from all over the world every year despite the recent renovations."], ["cercueil", "coffin", "Le cercueil en bois précieux a été porté avec émotion par les membres les plus proches de la famille lors de la cérémonie d’enterrement très émouvante.", "The precious wooden coffin was carried with emotion by the closest family members during the very moving burial ceremony."], ["gâché", "wasted / ruined / spoiled", "Toute cette nourriture fraîche a malheureusement été gâchée à cause d’une panne prolongée du réfrigérateur pendant le week-end de chaleur intense.", "All this fresh food was unfortunately wasted because of a prolonged refrigerator failure during the intense heat weekend."], ["bourré", "drunk (slang) / stuffed / full", "Il était complètement bourré après la fête de fin d’année au bureau, ce qui l’a obligé à prendre un taxi pour rentrer chez lui en toute sécurité.", "He was completely drunk after the office end-of-year party, which forced him to take a taxi home safely."], ["casier", "locker / record / rack", "Il range soigneusement ses affaires personnelles dans son casier au gymnase avant chaque séance d’entraînement afin de ne rien perdre.", "He carefully stores his personal belongings in his gym locker before each training session so that nothing gets lost."], ["pouce", "thumb", "Elle s’est blessée au pouce en coupant des légumes pour le dîner, ce qui l’a empêchée de taper sur son clavier pendant plusieurs jours.", "She injured her thumb while cutting vegetables for dinner, which prevented her from typing on her keyboard for several days."], ["joint", "joint (cigarette slang) / joint (mechanical) / connection", "Il a fumé un joint pendant la soirée entre amis, ce qui a détendu l’atmosphère mais l’a aussi rendu un peu moins clair dans ses idées.", "He smoked a joint during the evening with friends, which relaxed the atmosphere but also made him a little less clear in his thoughts."], ["poubelle", "trash can / rubbish bin", "N’oublie surtout pas de sortir la poubelle avant de partir en week-end, sinon les odeurs risquent de devenir insupportables à notre retour.", "Don’t forget to take out the trash before leaving for the weekend, otherwise the smells might become unbearable when we return."], ["panier", "basket", "Elle a mis toutes les courses dans un grand panier en osier qu’elle porte avec élégance sur son épaule pendant qu’elle traverse le marché.", "She put all the groceries in a large wicker basket that she carries elegantly on her shoulder while walking through the market."], ["cendres", "ashes", "Les cendres du feu de cheminée étaient encore chaudes quand nous sommes rentrés tard dans la soirée après une longue journée de randonnée.", "The ashes from the fireplace were still warm when we got home late in the evening after a long day of hiking."], ["matinée", "morning / matinée (theatre)", "Nous avons passé une matinée agréable à la plage avant de rentrer déjeuner, profitant du soleil qui n’était pas encore trop chaud.", "We spent a pleasant morning at the beach before going home for lunch, enjoying the sun that was not yet too hot."], ["viol", "rape / violation", "Le viol est considéré comme l’un des crimes les plus graves punis sévèrement par la loi dans tous les pays démocratiques modernes.", "Rape is considered one of the most serious crimes severely punished by law in all modern democratic countries."], ["pendre", "to hang", "Ils ont décidé de pendre les rideaux neufs aujourd’hui afin que la chambre paraisse plus chaleureuse et accueillante pour les invités.", "They decided to hang the new curtains today so that the room looks warmer and more welcoming for the guests."], ["anneau", "ring", "Il lui a offert un magnifique anneau en or blanc pour leurs fiançailles, ce qui l’a rendue extrêmement heureuse et émue.", "He gave her a magnificent white gold ring for their engagement, which made her extremely happy and moved."], ["nichons", "boobs / tits (vulgar slang)", "Elle portait un décolleté assez audacieux qui mettait clairement ses nichons en valeur, attirant tous les regards lors de la soirée.", "She was wearing a rather bold neckline that clearly highlighted her boobs, attracting all eyes during the evening."], ["grève", "strike / beach", "Les employés ont organisé une grève nationale afin de demander une augmentation de salaire et de meilleures conditions de travail.", "The employees organized a national strike to demand a salary increase and better working conditions."], ["couches", "diapers / layers", "Les bébés ont besoin de couches propres plusieurs fois par jour, ce qui représente une dépense importante pour les jeunes parents.", "Babies need clean diapers several times a day, which represents a significant expense for young parents."], ["saigne", "bleeds (from saigner)", "Il saigne du nez après avoir reçu un coup pendant le match de football, ce qui l’a obligé à sortir du terrain immédiatement.", "He is bleeding from the nose after receiving a hit during the football match, which forced him to leave the field immediately."], ["tache", "stain / spot", "Il y a une grosse tache de vin rouge sur la nappe blanche, ce qui risque de poser problème pour le dîner de ce soir.", "There is a big red wine stain on the white tablecloth, which could cause a problem for tonight’s dinner."], ["cuit", "cooked", "Le poulet est bien cuit et juteux à souhait ; il est prêt à être servi avec les légumes grillés que j’ai préparés en même temps.", "The chicken is well cooked and juicy as desired; it is ready to be served with the grilled vegetables that I prepared at the same time."], ["repéré", "spotted / noticed / located", "J’ai repéré un excellent restaurant végétarien près de la gare, ce qui sera parfait pour notre déjeuner de demain midi.", "I spotted an excellent vegetarian restaurant near the station, which will be perfect for our lunch tomorrow at noon."], ["foudre", "lightning", "La foudre est tombée sur un grand arbre pendant l’orage violent, causant un incendie que les pompiers ont rapidement maîtrisé.", "Lightning struck a large tree during the violent storm, causing a fire that the firefighters quickly brought under control."], ["poil", "hair (body) / bristle", "Il y a un poil sur ta chemise ; enlève-le avant de partir à l’entretien d’embauche pour faire bonne impression.", "There is a hair on your shirt; remove it before going to the job interview to make a good impression."], ["panne", "breakdown / failure", "La voiture est tombée en panne sur l’autoroute juste avant la sortie, ce qui nous a obligés à appeler une dépanneuse en urgence.", "The car broke down on the highway just before the exit, which forced us to call a tow truck urgently."], ["soigner", "to treat / to look after / to nurse", "Le médecin va soigner sa blessure à la jambe avec beaucoup de soin afin qu’il puisse reprendre le sport le plus rapidement possible.", "The doctor will treat his leg injury with great care so that he can resume sports as quickly as possible."], ["vedette", "star (celebrity) / launch (boat)", "Cette actrice est devenue une véritable vedette internationale grâce à son dernier film qui a remporté plusieurs prix prestigieux.", "This actress has become a true international star thanks to her latest film that won several prestigious awards."], ["sonné", "stunned / knocked out / rung", "Il était complètement sonné après avoir reçu le ballon en pleine tête pendant le match, ce qui l’a obligé à s’asseoir quelques minutes.", "He was completely stunned after receiving the ball right in the head during the match, which forced him to sit down for a few minutes."], ["embête", "bothers / annoys (from embêter)", "Arrête de m’embêter avec tes questions sans fin, j’ai vraiment besoin de me concentrer sur ce rapport urgent pour demain matin.", "Stop bothering me with your endless questions, I really need to concentrate on this urgent report for tomorrow morning."], ["pognon", "money (slang)", "Il a gagné beaucoup de pognon avec son dernier film à succès, ce qui lui permet maintenant de voyager partout dans le monde sans compter.", "He made a lot of money with his latest successful film, which now allows him to travel all over the world without counting."], ["tient", "holds / keeps (from tenir)", "Il tient sa promesse depuis des années malgré les difficultés, ce qui prouve à quel point il est une personne fiable et honnête.", "He has kept his promise for years despite the difficulties, which proves how reliable and honest he is."], ["soin", "care / treatment", "Elle prend grand soin de ses plantes d’intérieur, les arrosant régulièrement et les plaçant toujours près de la fenêtre pour qu’elles reçoivent assez de lumière.", "She takes great care of her indoor plants, watering them regularly and always placing them near the window so they get enough light."], ["preuve", "proof / evidence", "La police n’a pas encore trouvé de preuve concluante dans cette affaire complexe, ce qui rend l’enquête particulièrement difficile pour les enquêteurs.", "The police have not yet found conclusive evidence in this complex case, which makes the investigation particularly difficult for the investigators."], ["mignon", "cute / sweet", "Ce petit chaton est vraiment mignon avec ses yeux bleus et sa façon de jouer avec tout ce qui bouge dans la maison.", "This little kitten is really cute with its blue eyes and the way it plays with everything that moves in the house."], ["vitesse", "speed", "La voiture roulait à une vitesse excessive sur la route étroite et sinueuse, ce qui a inquiété tous les passagers pendant le trajet.", "The car was driving at excessive speed on the narrow and winding road, which worried all the passengers during the journey."], ["menti", "lied (from mentir)", "Il a menti à ses parents sur ses résultats scolaires, ce qui a créé une tension inutile dans la famille pendant plusieurs semaines.", "He lied to his parents about his school results, which created unnecessary tension in the family for several weeks."], ["enceinte", "pregnant", "Elle est enceinte de six mois et se sent en pleine forme, même si elle doit faire attention à son alimentation et à son repos quotidien.", "She is six months pregnant and feels in great shape, even though she has to be careful with her diet and daily rest."], ["savons", "soaps (from savon)", "J’ai acheté plusieurs savons parfumés à la lavande pour la salle de bain, car ils laissent une odeur agréable et relaxante après la douche.", "I bought several lavender-scented soaps for the bathroom because they leave a pleasant and relaxing scent after the shower."], ["toit", "roof", "Le toit de la maison a besoin d’être réparé urgemment après la tempête violente de la semaine dernière qui a causé plusieurs fuites importantes.", "The roof of the house needs urgent repair after last week’s violent storm that caused several major leaks."], ["queue", "tail / queue / line", "Il y avait une longue queue devant le cinéma ce soir, ce qui nous a obligés à attendre presque une heure avant de pouvoir entrer.", "There was a long queue in front of the cinema tonight, which forced us to wait almost an hour before we could enter."], ["cesse", "stops / ceases (from cesser)", "La pluie ne cesse pas depuis ce matin, ce qui rend impossible toute sortie à l’extérieur pour les enfants qui s’ennuient déjà.", "The rain hasn’t stopped since this morning, which makes any outdoor outing impossible for the children who are already bored."], ["os", "bone", "Le chien ronge un gros os dans le jardin avec beaucoup de plaisir, ce qui l’occupe pendant de longues minutes chaque après-midi.", "The dog is gnawing on a big bone in the garden with great pleasure, which keeps it occupied for long minutes every afternoon."], ["ventre", "belly / stomach", "Il a mal au ventre après avoir trop mangé pendant le repas de fête, ce qui l’a obligé à s’allonger un moment sur le canapé.", "He has a stomach ache after eating too much during the festive meal, which forced him to lie down for a while on the sofa."], ["amené", "brought (from amener)", "Il a amené ses amis à la fête surprise organisée pour son anniversaire, ce qui a rendu la soirée encore plus joyeuse et animée.", "He brought his friends to the surprise party organized for his birthday, which made the evening even more joyful and lively."], ["milliers", "thousands", "Des milliers de personnes ont assisté au concert gratuit donné par le groupe célèbre dans le parc central de la ville.", "Thousands of people attended the free concert given by the famous band in the central park of the city."], ["gorge", "throat / gorge", "J’ai mal à la gorge depuis hier à cause du froid, ce qui m’empêche de parler normalement pendant les réunions importantes.", "I have a sore throat since yesterday because of the cold, which prevents me from speaking normally during important meetings."], ["ombre", "shadow / shade", "L’ombre des grands arbres nous protège efficacement du soleil brûlant pendant notre pique-nique au bord du lac cet après-midi.", "The shade of the large trees effectively protects us from the burning sun during our picnic by the lake this afternoon."], ["épée", "sword", "Le chevalier brandit son épée avec force pendant le combat spectaculaire qui a captivé tous les spectateurs dans l’arène.", "The knight brandishes his sword with force during the spectacular fight that captivated all the spectators in the arena."], ["fuir", "to flee / to leak", "Il a décidé de fuir le pays pour des raisons politiques sérieuses, ce qui a bouleversé toute sa famille restée sur place.", "He decided to flee the country for serious political reasons, which upset his entire family who remained on site."], ["souci", "worry / concern", "Il se fait beaucoup de souci pour l’avenir de ses enfants dans ce monde en constante évolution, ce qui l’empêche parfois de dormir sereinement.", "He worries a lot about the future of his children in this constantly evolving world, which sometimes prevents him from sleeping peacefully."], ["dégagez", "get out / clear off (imperative slang)", "Dégagez de là immédiatement, ce n’est vraiment pas votre place et vous risquez de créer des problèmes inutiles pour tout le monde.", "Get out of here immediately, this is really not your place and you risk creating unnecessary problems for everyone."], ["menteur", "liar", "Personne ne lui fait plus confiance parce qu’il est connu comme un menteur invétéré qui invente des histoires à la moindre occasion.", "No one trusts him anymore because he is known as a habitual liar who makes up stories at the slightest opportunity."], ["semblant", "appearance / pretense", "Il fait semblant d’être malade pour éviter le travail difficile, ce qui commence à agacer sérieusement ses collègues les plus proches.", "He pretends to be sick to avoid difficult work, which is starting to seriously annoy his closest colleagues."], ["douche", "shower", "Je prends une douche chaude tous les matins afin de me réveiller complètement avant de commencer ma journée de travail chargée.", "I take a hot shower every morning to fully wake up before starting my busy workday."], ["chaleur", "heat", "La chaleur de l’été est devenue difficile à supporter ces derniers jours, surtout sans climatisation dans l’appartement.", "The summer heat has become difficult to bear these last days, especially without air conditioning in the apartment."], ["monté", "went up / assembled / mounted", "Il est monté au dernier étage de la tour Eiffel pour admirer la vue panoramique spectaculaire sur tout Paris illuminé.", "He went up to the top floor of the Eiffel Tower to admire the spectacular panoramic view of all of illuminated Paris."], ["bat", "beats (from battre)", "Mon cœur bat plus fort chaque fois que je te vois entrer dans la pièce, ce qui me rend un peu nerveux mais très heureux en même temps.", "My heart beats faster every time I see you enter the room, which makes me a little nervous but very happy at the same time."], ["titres", "titles / headlines / stocks", "Les titres des journaux parlent presque exclusivement de la crise économique actuelle qui affecte tous les secteurs du pays.", "The newspaper headlines speak almost exclusively about the current economic crisis that affects all sectors of the country."], ["singe", "monkey", "Le singe a volé une banane au zoo sous le regard amusé des enfants qui observaient la scène avec beaucoup d’attention.", "The monkey stole a banana at the zoo under the amused gaze of the children who watched the scene with great attention."], ["ours", "bear", "Un ours a été aperçu récemment dans la forêt voisine, ce qui a poussé les autorités à avertir les randonneurs de rester prudents.", "A bear was recently spotted in the neighboring forest, which prompted the authorities to warn hikers to be careful."], ["navire", "ship", "Le navire de croisière a quitté le port à l’aube pour une traversée de dix jours à travers l’océan Atlantique calme et ensoleillé.", "The cruise ship left the port at dawn for a ten-day crossing across the calm and sunny Atlantic Ocean."], ["laisses", "leashes / leave (imperative from laisser)", "Ne laisse pas tes affaires traîner partout dans la maison, sinon on risque de ne plus rien retrouver quand on en aura besoin.", "Don’t leave your things lying around everywhere in the house, otherwise we risk not finding anything when we need it."], ["aube", "dawn", "Nous nous sommes levés à l’aube pour admirer le lever du soleil sur les montagnes, un spectacle naturel absolument magnifique et inoubliable.", "We got up at dawn to admire the sunrise over the mountains, an absolutely magnificent and unforgettable natural spectacle."], ["nana", "girl / chick (slang)", "Cette nana est super sympa et toujours de bonne humeur, ce qui rend les soirées entre amis beaucoup plus agréables et détendues.", "This chick is super nice and always in a good mood, which makes evenings with friends much more pleasant and relaxed."], ["juif", "Jewish", "La communauté juive célèbre la fête de Hanoukka avec beaucoup de joie et de traditions transmises de génération en génération.", "The Jewish community celebrates Hanukkah with great joy and traditions passed down from generation to generation."], ["hais", "hate (from haïr)", "Je hais les injustices sociales qui persistent encore dans notre société moderne malgré tous les progrès réalisés ces dernières décennies.", "I hate the social injustices that still persist in our modern society despite all the progress made in recent decades."], ["soi", "oneself", "Il faut parfois savoir penser à soi avant de toujours s’occuper des autres, surtout quand on se sent épuisé mentalement.", "Sometimes you have to know how to think of yourself before always taking care of others, especially when you feel mentally exhausted."], ["tir", "shot / shooting", "Le tir de l’équipe nationale a été particulièrement impressionnant pendant le match décisif qui a permis de remporter la coupe.", "The national team’s shooting was particularly impressive during the decisive match that allowed them to win the cup."], ["prennent", "take (from prendre)", "Ils prennent le train à grande vitesse pour aller à Paris afin d’arriver plus rapidement et de profiter pleinement de leur week-end.", "They take the high-speed train to go to Paris in order to arrive faster and fully enjoy their weekend."], ["foyer", "home / fireplace / household", "Le foyer familial reste très important pour lui, surtout après avoir passé plusieurs années à l’étranger pour son travail.", "The family home remains very important to him, especially after spending several years abroad for his work."], ["porc", "pig / pork", "Le porc est élevé de manière traditionnelle dans cette ferme bio, ce qui garantit une viande de très bonne qualité pour les consommateurs.", "Pork is raised in a traditional way on this organic farm, which guarantees very good quality meat for consumers."], ["ravie", "delighted (feminine)", "Elle était ravie de recevoir ce cadeau inattendu qui correspondait exactement à ce dont elle rêvait depuis longtemps.", "She was delighted to receive this unexpected gift that exactly matched what she had been dreaming of for a long time."], ["sonne", "rings / sounds (from sonner)", "Le téléphone sonne depuis dix minutes sans arrêt, ce qui commence vraiment à m’agacer pendant que j’essaie de me concentrer sur mon travail.", "The phone has been ringing non-stop for ten minutes, which is really starting to annoy me while I try to concentrate on my work."], ["soif", "thirst", "J’ai très soif après cette longue randonnée en montagne sous un soleil de plomb qui n’a pas cessé de briller de toute la journée.", "I am very thirsty after this long mountain hike under a blazing sun that hasn’t stopped shining all day."], ["haine", "hate", "La haine peut malheureusement détruire des relations solides qui existaient depuis des années entre amis ou membres d’une même famille.", "Hate can unfortunately destroy solid relationships that have existed for years between friends or family members."], ["barre", "bar / bar (legal) / steering wheel", "Il tient fermement la barre du bateau pendant la traversée mouvementée afin d’éviter que le navire ne dévie de sa route prévue.", "He holds the boat’s steering wheel firmly during the rough crossing to prevent the ship from deviating from its planned course."], ["empreintes", "footprints / fingerprints", "La police a relevé des empreintes digitales très claires sur la scène de crime, ce qui devrait permettre d’identifier rapidement le suspect principal.", "The police took very clear fingerprints at the crime scene, which should allow them to quickly identify the main suspect."], ["proches", "close / near / relatives", "Ses proches l’ont soutenu sans faille pendant cette période particulièrement difficile de sa vie après l’accident de voiture.", "His relatives supported him flawlessly during this particularly difficult period of his life after the car accident."], ["enfuir", "to flee / to run away", "Il a essayé de s’enfuir de la prison en creusant un tunnel, mais il a été repris par les gardiens avant d’atteindre la liberté.", "He tried to escape from prison by digging a tunnel, but he was recaptured by the guards before reaching freedom."], ["ménage", "housework / household", "Elle fait le ménage tous les samedis matin afin que l’appartement reste toujours propre et accueillant pour les invités imprévus.", "She does the housework every Saturday morning so that the apartment always remains clean and welcoming for unexpected guests."], ["pareille", "same / similar (feminine)", "Je n’ai jamais vu une situation pareille de toute ma vie, ce qui me laisse complètement perplexe sur la façon de réagir.", "I have never seen such a situation in my entire life, which leaves me completely perplexed about how to react."], ["soucis", "worries / concerns", "Il a beaucoup de soucis en ce moment à cause de problèmes professionnels et familiaux qui s’accumulent depuis plusieurs mois.", "He has a lot of worries at the moment because of professional and family problems that have been accumulating for several months."], ["rater", "to miss / to fail", "Je ne veux surtout pas rater mon train pour Paris, car le suivant n’arrive que dans plus de deux heures et je risque d’être en retard à mon rendez-vous.", "I absolutely do not want to miss my train to Paris, because the next one only arrives in more than two hours and I risk being late for my appointment."], ["emmené", "taken / brought (from emmener)", "Il a emmené toute sa famille en vacances en Espagne afin de passer du temps de qualité ensemble loin du stress quotidien du travail.", "He took his whole family on holiday to Spain in order to spend quality time together far from the daily stress of work."], ["tromper", "to cheat / to deceive", "Il ne faut jamais tromper la confiance des autres, car cela peut détruire une relation durable en quelques secondes seulement.", "You should never betray the trust of others, because it can destroy a lasting relationship in just a few seconds."], ["trompé", "cheated / deceived", "Elle s’est sentie profondément trompée par son meilleur ami qui lui avait caché la vérité pendant plusieurs mois.", "She felt deeply deceived by her best friend who had hidden the truth from her for several months."], ["cadavre", "corpse / dead body", "La police a découvert un cadavre dans la forêt après une longue enquête qui a mobilisé de nombreux agents pendant plusieurs jours.", "The police discovered a corpse in the forest after a long investigation that mobilized many officers for several days."], ["feriez", "would do (conditional from faire)", "Que feriez-vous à ma place dans cette situation délicate qui demande une décision rapide et réfléchie ?", "What would you do in my place in this delicate situation that requires a quick and thoughtful decision?"], ["meurtres", "murders", "La série télévisée parle de plusieurs meurtres mystérieux qui ont eu lieu dans une petite ville tranquille du nord de la France.", "The TV series is about several mysterious murders that took place in a quiet small town in the north of France."], ["juré", "sworn / sworn in", "Il a juré de dire toute la vérité devant le tribunal, ce qui a impressionné les jurés par son calme et sa sincérité évidente.", "He swore to tell the whole truth in court, which impressed the jurors with his calm and obvious sincerity."], ["miel", "honey", "Le miel est particulièrement bon pour apaiser la gorge irritée, surtout quand on l’ajoute à une tisane chaude avant de dormir.", "Honey is particularly good for soothing a sore throat, especially when added to a hot herbal tea before sleeping."], ["sable", "sand", "Nous avons marché pieds nus sur le sable chaud de la plage pendant des heures, profitant du bruit des vagues et du soleil couchant.", "We walked barefoot on the warm sand of the beach for hours, enjoying the sound of the waves and the setting sun."], ["pur", "pure", "C’est de l’eau pure de montagne qui provient directement d’une source naturelle et protégée, ce qui la rend particulièrement rafraîchissante.", "It is pure mountain water that comes directly from a natural and protected source, which makes it particularly refreshing."], ["forcément", "necessarily / inevitably", "Ça ne marche pas forcément comme prévu dans la vie, même quand on a tout préparé avec le plus grand soin possible.", "It doesn’t always work out as planned in life, even when you have prepared everything with the greatest possible care."], ["comportement", "behaviour / conduct", "Son comportement a complètement changé depuis l’accident, ce qui inquiète beaucoup ses amis et sa famille proche.", "His behavior has completely changed since the accident, which worries his friends and close family a lot."], ["avoue", "confesses / admits", "Il avoue enfin la vérité après plusieurs heures d’interrogatoire intense, ce qui soulage tout le monde dans la salle.", "He finally admits the truth after several hours of intense questioning, which relieves everyone in the room."], ["doué", "talented / gifted", "Elle est vraiment douée en musique, ce qui lui a permis de composer plusieurs chansons originales qui ont déjà beaucoup de succès.", "She is really talented in music, which has allowed her to compose several original songs that are already very successful."], ["poitrine", "chest / breasts", "Il a mal à la poitrine après l’effort physique intense qu’il a fourni pendant la course de fond de ce dimanche matin.", "He has chest pain after the intense physical effort he put in during this Sunday morning’s long-distance run."], ["remis", "put back / handed over / recovered", "Il s’est complètement remis de sa maladie grâce aux soins attentifs des médecins et au repos qu’il a pris pendant plusieurs semaines.", "He has completely recovered from his illness thanks to the attentive care of the doctors and the rest he took for several weeks."], ["loup", "wolf", "Le loup hurle à la lune pleine dans la forêt dense, créant une atmosphère mystérieuse et un peu inquiétante pour les campeurs.", "The wolf howls at the full moon in the dense forest, creating a mysterious and somewhat worrying atmosphere for the campers."], ["portée", "range / litter / carried (from porter)", "Cette information importante est désormais à la portée de tous grâce à internet et aux réseaux sociaux qui diffusent les nouvelles instantanément.", "This important information is now within everyone’s reach thanks to the internet and social networks that spread the news instantly."], ["enterrement", "burial / funeral", "L’enterrement aura lieu demain matin dans l’église du village où toute la famille est rassemblée pour dire un dernier adieu au défunt.", "The burial will take place tomorrow morning in the village church where the whole family is gathered to say a final goodbye to the deceased."], ["cave", "cellar / basement", "Il garde sa collection de bons vins dans sa cave fraîche et bien organisée, ce qui lui permet de les déguster au bon moment.", "He keeps his collection of good wines in his cool and well-organized cellar, which allows him to taste them at the right time."], ["préviens", "warn / inform (imperative from prévenir)", "Préviens-moi immédiatement si tu changes d’avis sur le projet, afin que je puisse ajuster mes plans en conséquence sans perdre de temps.", "Warn me immediately if you change your mind about the project, so that I can adjust my plans accordingly without wasting time."], ["ailes", "wings", "L’oiseau bat des ailes avec force pour s’envoler du nid et partir explorer le vaste ciel bleu au-dessus de la forêt.", "The bird flaps its wings with force to fly out of the nest and go explore the vast blue sky above the forest."], ["bagarre", "fight / brawl", "Il y a eu une bagarre assez violente dans le bar hier soir, ce qui a obligé la police à intervenir rapidement pour calmer les esprits.", "There was a rather violent brawl in the bar last night, which forced the police to intervene quickly to calm everyone down."], ["attrapé", "caught", "La police a finalement attrapé le voleur après une longue poursuite à travers les rues étroites du quartier ancien de la ville.", "The police finally caught the thief after a long chase through the narrow streets of the old district of the city."], ["barbe", "beard", "Il se laisse pousser la barbe depuis plus d’un mois maintenant, ce qui lui donne un air plus mature et réfléchi.", "He has been growing his beard for more than a month now, which gives him a more mature and thoughtful look."], ["ranger", "to tidy / to put away", "Il faut absolument ranger ta chambre avant de sortir ce soir, sinon tes parents risquent de se fâcher en rentrant du travail.", "You absolutely have to tidy your room before going out tonight, otherwise your parents risk getting angry when they come home from work."], ["géant", "giant", "Ce bâtiment moderne est un véritable géant de l’architecture contemporaine qui domine tout le paysage urbain de la capitale.", "This modern building is a true giant of contemporary architecture that dominates the entire urban landscape of the capital."], ["exprès", "on purpose", "Il l’a fait exprès pour me contrarier, ce qui montre à quel point il peut parfois être immature dans ses réactions.", "He did it on purpose to annoy me, which shows how immature he can sometimes be in his reactions."], ["anges", "angels", "Les anges sont souvent représentés avec de grandes ailes blanches dans les peintures religieuses classiques du Moyen Âge.", "Angels are often depicted with large white wings in classic medieval religious paintings."], ["échec", "failure", "Cet échec professionnel lui a finalement servi de leçon précieuse pour mieux réussir la prochaine fois avec plus de préparation.", "This professional failure finally served him as a valuable lesson to succeed better next time with more preparation."], ["bol", "bowl / luck (slang)", "J’ai eu un bol monstre aujourd’hui en trouvant une place de parking juste devant le magasin pendant les soldes !", "I had incredible luck today by finding a parking spot right in front of the store during the sales!"], ["mignonne", "cute (feminine)", "Cette robe légère la rend particulièrement mignonne et élégante pour la soirée d’été que nous organisons demain soir.", "This light dress makes her particularly cute and elegant for the summer evening we are organizing tomorrow night."], ["enterré", "buried", "Le trésor légendaire est enterré sous le vieux chêne au milieu de la forêt, selon la carte ancienne que nous avons découverte.", "The legendary treasure is buried under the old oak tree in the middle of the forest, according to the old map we discovered."], ["hauteur", "height", "Il mesure presque deux mètres de hauteur, ce qui lui permet d’atteindre facilement les étagères les plus hautes sans escabeau.", "He is almost two meters tall, which allows him to easily reach the highest shelves without a stepladder."], ["fêter", "to celebrate", "Nous allons fêter son anniversaire samedi soir avec tous ses amis proches dans un restaurant chic du centre-ville.", "We are going to celebrate his birthday on Saturday evening with all his close friends in a chic restaurant in the city center."], ["altesse", "highness", "Votre Altesse, le dîner est servi dans la grande salle comme vous l’avez demandé ce matin lors de notre réunion.", "Your Highness, dinner is served in the large hall as you requested this morning during our meeting."], ["précis", "precise / exact", "Il est toujours très précis dans ses calculs mathématiques, ce qui lui a permis de remporter plusieurs concours scientifiques nationaux.", "He is always very precise in his mathematical calculations, which has allowed him to win several national scientific competitions."], ["rempli", "full / filled", "Le verre est complètement rempli de jus d’orange frais que j’ai pressé moi-même ce matin pour le petit-déjeuner.", "The glass is completely filled with fresh orange juice that I squeezed myself this morning for breakfast."], ["avouer", "to confess / to admit", "Il faut bien avouer qu’il a raison sur ce point précis, même si cela me coûte un peu de le reconnaître publiquement.", "We have to admit that he is right on this precise point, even if it costs me a little to recognize it publicly."], ["énerve", "annoys / gets on nerves (from énerver)", "Ça m’énerve vraiment quand il arrive systématiquement en retard à nos rendez-vous, surtout quand c’est important.", "It really annoys me when he is systematically late for our appointments, especially when it is important."], ["loyer", "rent", "Le loyer de l’appartement a encore augmenté cette année à cause de l’inflation, ce qui rend la vie un peu plus difficile pour les étudiants.", "The rent of the apartment has increased again this year because of inflation, which makes life a little more difficult for students."], ["saches", "know (subjunctive from savoir)", "Je veux que tu saches la vérité complète avant de prendre ta décision finale sur ce sujet délicat qui nous concerne tous.", "I want you to know the full truth before making your final decision on this delicate subject that concerns us all."], ["séance", "meeting / session / screening", "La séance de cinéma commence à vingt heures précises, alors dépêchons-nous si nous voulons avoir de bonnes places au centre.", "The cinema screening starts at exactly eight o’clock, so let’s hurry if we want good seats in the middle."], ["placard", "cupboard / closet", "Range tous les vêtements propres dans le placard de l’entrée afin que la chambre reste bien ordonnée pour l’arrivée des invités.", "Put all the clean clothes in the entrance cupboard so that the room remains tidy for the guests’ arrival."], ["amant", "lover", "Elle a découvert que son mari avait un amant depuis plusieurs mois, ce qui a provoqué une crise majeure dans leur couple.", "She discovered that her husband had a lover for several months, which caused a major crisis in their relationship."], ["tenait", "held / was holding (from tenir)", "Il tenait fermement la main de son enfant pendant qu’ils traversaient la rue très fréquentée au centre-ville.", "He was firmly holding his child’s hand while they crossed the very busy street in the city center."], ["hélas", "alas / unfortunately", "Hélas, il est déjà trop tard pour changer d’avis sur ce projet important qui a déjà été lancé depuis plusieurs semaines.", "Alas, it is already too late to change our minds about this important project that has already been launched for several weeks."], ["furent", "were (past of être)", "Ils furent tous très surpris par la nouvelle inattendue qui a complètement changé leurs plans pour l’été prochain.", "They were all very surprised by the unexpected news that completely changed their plans for next summer."], ["poudre", "powder", "Elle met toujours un peu de poudre sur son visage avant de sortir afin d’avoir un teint parfait et mat pour la journée.", "She always puts a little powder on her face before going out in order to have a perfect and matte complexion for the day."], ["serment", "oath / vow", "Il a prêté serment devant le tribunal de dire toute la vérité et rien que la vérité, ce qui a impressionné les jurés.", "He took an oath in court to tell the whole truth and nothing but the truth, which impressed the jurors."], ["portefeuille", "wallet", "J’ai malheureusement oublié mon portefeuille à la maison ce matin, ce qui m’a obligé à emprunter de l’argent à un collègue pour le déjeuner.", "I unfortunately forgot my wallet at home this morning, which forced me to borrow money from a colleague for lunch."], ["réalisateur", "director / filmmaker", "Ce réalisateur talentueux a gagné un Oscar l’année dernière pour son dernier film dramatique qui a touché le cœur de millions de spectateurs.", "This talented director won an Oscar last year for his latest dramatic film that touched the hearts of millions of viewers."], ["âmes", "souls", "Les âmes des défunts reposent enfin en paix dans ce cimetière ancien et paisible entouré d’arbres centenaires.", "The souls of the deceased finally rest in peace in this ancient and peaceful cemetery surrounded by century-old trees."], ["ivre", "drunk", "Il était complètement ivre après la fête de fin d’année au bureau, ce qui l’a obligé à passer la nuit chez un ami proche.", "He was completely drunk after the office end-of-year party, which forced him to spend the night at a close friend’s house."], ["remets", "put back / hand over (imperative from remettre)", "Remets le livre exactement à sa place sur l’étagère afin que tout reste bien ordonné dans la bibliothèque familiale.", "Put the book back exactly in its place on the shelf so that everything remains tidy in the family library."], ["lancé", "launched / thrown", "Il a lancé le ballon très loin pendant le match de football, ce qui a permis à son équipe de marquer le but décisif de la victoire.", "He threw the ball very far during the football match, which allowed his team to score the decisive goal of victory."], ["renseignements", "information / enquiries", "Je vais demander des renseignements précis à l’accueil de l’hôtel afin de savoir exactement où se trouve le musée le plus proche.", "I am going to ask for precise information at the hotel reception to find out exactly where the nearest museum is."], ["loué", "rented / praised", "Il a loué une voiture confortable pour le week-end afin de pouvoir explorer librement la région sans dépendre des transports en commun.", "He rented a comfortable car for the weekend in order to explore the region freely without depending on public transport."], ["trous", "holes", "Il y a plusieurs trous dans mes chaussettes préférées, ce qui m’oblige à en acheter une nouvelle paire dès demain matin.", "There are several holes in my favorite socks, which forces me to buy a new pair tomorrow morning."], ["rappelez", "call back / remind (imperative from rappeler)", "Rappelez-moi demain matin vers neuf heures afin que nous puissions finaliser les derniers détails du contrat important.", "Call me back tomorrow morning around nine o’clock so that we can finalize the last details of the important contract."], ["neveu", "nephew", "Mon neveu vient passer les vacances d’été chez moi cette année, ce qui me rend particulièrement heureux de le revoir.", "My nephew is coming to spend the summer holidays at my house this year, which makes me particularly happy to see him again."], ["briser", "to break", "Fais très attention à ne pas briser ce vase ancien qui appartient à la famille depuis plusieurs générations.", "Be very careful not to break this ancient vase that has belonged to the family for several generations."], ["blé", "wheat / money (slang)", "Le blé est prêt à être récolté dans les champs dorés qui s’étendent à perte de vue sous le soleil d’été.", "The wheat is ready to be harvested in the golden fields that stretch as far as the eye can see under the summer sun."], ["écraser", "to crush / to run over", "Ne roule surtout pas trop vite sur cette route de campagne, car tu pourrais facilement écraser un animal sauvage qui traverse soudainement.", "Don’t drive too fast on this country road, because you could easily run over a wild animal that suddenly crosses."], ["miens", "mine (possessive)", "Ces livres anciens sont les miens et je les ai hérités de mon grand-père qui était un passionné de littérature française.", "These ancient books are mine and I inherited them from my grandfather who was a passionate lover of French literature."], ["fierté", "pride", "Elle ressent une grande fierté pour son fils qui vient de réussir brillamment son examen final après des mois d’efforts soutenus.", "She feels great pride for her son who has just brilliantly passed his final exam after months of sustained effort."], ["pari", "bet / wager", "Il a gagné son pari hier soir grâce à une intuition remarquable qui a surpris tout le monde autour de la table.", "He won his bet last night thanks to a remarkable intuition that surprised everyone around the table."], ["exige", "requires / demands", "Ce travail exige beaucoup de concentration et de précision, surtout quand il s’agit de chiffres et de données confidentielles.", "This work requires a lot of concentration and precision, especially when it comes to figures and confidential data."], ["démarre", "starts (from démarrer)", "La voiture démarre difficilement le matin à cause du froid hivernal qui a gelé le moteur pendant la nuit.", "The car starts with difficulty in the morning because of the winter cold that froze the engine during the night."], ["lâchez", "let go / release (imperative)", "Lâchez ce chien immédiatement, il est vraiment dangereux et risque de blesser quelqu’un dans le parc bondé.", "Release this dog immediately, it is really dangerous and risks injuring someone in the crowded park."], ["gérer", "to manage / to handle", "Elle sait très bien gérer son entreprise familiale depuis qu’elle en a pris la direction il y a maintenant trois ans.", "She knows how to manage her family business very well since she took over the management three years ago."], ["sourd", "deaf", "Il est sourd depuis son enfance à cause d’une maladie grave qui a affecté ses oreilles de manière permanente.", "He has been deaf since childhood because of a serious illness that permanently affected his ears."], ["convient", "suits / is suitable", "Cette robe élégante lui convient parfaitement pour la cérémonie officielle à laquelle elle doit assister demain soir.", "This elegant dress suits her perfectly for the official ceremony she must attend tomorrow evening."], ["trahi", "betrayed", "Il s’est senti profondément trahi par son meilleur ami qui avait révélé son secret à tout le groupe sans sa permission.", "He felt deeply betrayed by his best friend who had revealed his secret to the whole group without his permission."], ["soins", "care / treatment", "Il reçoit actuellement des soins médicaux très spécialisés à l’hôpital universitaire le plus réputé de la région.", "He is currently receiving highly specialized medical care at the most reputable university hospital in the region."], ["veuve", "widow", "La veuve porte encore le deuil de son mari disparu il y a maintenant deux ans dans un accident tragique.", "The widow is still mourning her husband who disappeared two years ago in a tragic accident."], ["dépêche", "hurry / dispatch (imperative from se dépêcher)", "Dépêche-toi un peu, on est déjà en retard pour le rendez-vous important avec le directeur du projet !", "Hurry up a bit, we are already late for the important meeting with the project director!"], ["dégoûtant", "disgusting / revolting", "Ce film d’horreur est vraiment dégoûtant à cause des scènes violentes et sanglantes qui sont beaucoup trop réalistes.", "This horror film is really disgusting because of the violent and bloody scenes that are much too realistic."], ["pervers", "perverse / perverted", "Son comportement est parfois pervers et manipulateur, ce qui met mal à l’aise tous ceux qui le connaissent bien.", "His behavior is sometimes perverse and manipulative, which makes everyone who knows him well uncomfortable."], ["échelle", "ladder / scale", "Il a utilisé une grande échelle pour atteindre le plafond et peindre la pièce en blanc comme prévu depuis longtemps.", "He used a large ladder to reach the ceiling and paint the room white as planned for a long time."], ["cadavres", "corpses / dead bodies", "Les cadavres ont été retrouvés dans la cave abandonnée après une enquête longue et difficile menée par la police scientifique.", "The corpses were found in the abandoned cellar after a long and difficult investigation carried out by the forensic police."], ["libéré", "freed / released", "Le prisonnier a finalement été libéré après dix années de détention grâce à de nouvelles preuves qui ont innocenté son cas.", "The prisoner was finally released after ten years of detention thanks to new evidence that cleared his case."], ["fêtes", "parties / festivals", "Les fêtes de fin d’année approchent à grands pas, ce qui rend tout le monde particulièrement joyeux et excité dans les rues illuminées.", "The end-of-year festivities are approaching fast, which makes everyone particularly joyful and excited in the illuminated streets."], ["méchants", "naughty / evil / mean", "Les méchants dans ce film d’action sont très convaincants et terrifiants grâce au talent exceptionnel des acteurs qui les incarnent.", "The villains in this action film are very convincing and terrifying thanks to the exceptional talent of the actors who portray them."], ["serviette", "towel / napkin", "Passe-moi une serviette propre pour essuyer la table après le repas, car il y a encore des miettes partout.", "Pass me a clean towel to wipe the table after the meal, because there are still crumbs everywhere."], ["étonne", "surprises (from étonner)", "Ça m’étonne vraiment qu’il soit déjà arrivé à l’heure pour une fois, car il est habituellement toujours en retard.", "It really surprises me that he has already arrived on time for once, because he is usually always late."], ["ordure", "rubbish / scum (insult)", "Ne traite jamais les gens d’ordure, même quand tu es en colère, car cela peut blesser profondément et durablement.", "Never call people rubbish, even when you are angry, because it can hurt deeply and lastingly."], ["sûrs", "sure / certain (masculine plural)", "Nous sommes maintenant sûrs de notre décision finale après avoir longuement discuté de tous les avantages et inconvénients possibles.", "We are now sure of our final decision after having discussed all the possible advantages and disadvantages at length."], ["demeure", "remains / resides / mansion", "Il demeure encore dans cette belle demeure ancienne qu’il a héritée de ses grands-parents il y a plusieurs années.", "He still lives in this beautiful old mansion that he inherited from his grandparents several years ago."], ["rendez", "meet / hand over (imperative from rendre)", "Rendez-moi mon argent immédiatement, car je ne peux plus attendre davantage pour régler cette dette importante.", "Give me my money back immediately, because I can no longer wait any longer to settle this important debt."], ["psy", "psychologist / shrink (slang)", "Elle va voir son psy une fois par semaine afin de mieux gérer son stress et ses angoisses liées au travail.", "She goes to see her shrink once a week in order to better manage her stress and work-related anxieties."], ["déçu", "disappointed", "Je suis vraiment déçu par son comportement immature lors de la réunion importante d’hier après-midi.", "I am really disappointed by his immature behavior during yesterday afternoon’s important meeting."], ["tentative", "attempt", "C’était une tentative courageuse et bien préparée qui a malheureusement échoué à cause d’un imprévu technique de dernière minute.", "It was a courageous and well-prepared attempt that unfortunately failed because of a last-minute technical unforeseen event."], ["entretien", "interview / maintenance", "Il a passé un entretien d’embauche très sérieux hier matin pour un poste important dans une grande entreprise internationale.", "He had a very serious job interview yesterday morning for an important position in a large international company."], ["acier", "steel", "Ce couteau de cuisine professionnel est fabriqué en acier inoxydable de très haute qualité qui reste tranchant pendant des années.", "This professional kitchen knife is made of very high quality stainless steel that remains sharp for years."], ["patrie", "homeland / fatherland", "Il aime profondément sa patrie et est prêt à tout pour la défendre en cas de besoin, même au prix de grands sacrifices personnels.", "He deeply loves his homeland and is ready to do anything to defend it if necessary, even at the cost of great personal sacrifices."], ["régime", "diet / regime / government", "Elle suit un régime alimentaire strict et équilibré depuis plusieurs mois afin de perdre du poids de manière saine et durable.", "She has been following a strict and balanced diet for several months in order to lose weight in a healthy and sustainable way."], ["éteint", "extinguished / turned off", "La lumière est complètement éteinte dans la chambre depuis que tout le monde est allé se coucher il y a une heure.", "The light is completely turned off in the bedroom since everyone went to bed an hour ago."], ["vise", "aims / targets (from viser)", "Il vise la première place au concours national de mathématiques grâce à son travail acharné et ses révisions quotidiennes.", "He aims for first place in the national mathematics competition thanks to his hard work and daily revisions."], ["sain", "healthy / sound", "Il mène une vie saine et équilibrée en faisant du sport régulièrement et en mangeant des légumes frais tous les jours.", "He leads a healthy and balanced life by exercising regularly and eating fresh vegetables every day."], ["goutte", "drop", "Une petite goutte de pluie est tombée sur mon nez juste au moment où je sortais de la maison ce matin.", "A small drop of rain fell on my nose just as I was leaving the house this morning."], ["cole", "cole (rare) / possibly typo for “colle” (glue / detention)", "Je vais te coller une punition si tu continues à te comporter de cette façon irrespectueuse envers tes camarades de classe.", "I am going to give you a punishment if you continue to behave in this disrespectful way towards your classmates."], ["volée", "flight / volley / stolen (from voler)", "Il a reçu une volée de coups pendant la bagarre qui a éclaté soudainement dans le bar bondé hier soir.", "He received a volley of blows during the brawl that suddenly broke out in the crowded bar last night."], ["cravate", "tie", "Il porte une belle cravate rouge parfaitement assortie à sa chemise blanche pour l’entretien d’embauche important de cet après-midi.", "He is wearing a beautiful red tie perfectly matched to his white shirt for the important job interview this afternoon."], ["ose", "dares", "Il n’ose pas lui dire la vérité en face, ce qui rend la situation encore plus compliquée et tendue entre eux.", "He does not dare to tell her the truth face to face, which makes the situation even more complicated and tense between them."], ["charger", "to load / to charge", "Il faut absolument charger le téléphone portable avant de partir en voyage, sinon on risque de se retrouver sans batterie en pleine urgence.", "You absolutely have to charge the mobile phone before leaving on a trip, otherwise you risk being without battery in an emergency."], ["repris", "taken back / resumed", "Il a repris le travail avec enthousiasme après sa longue maladie qui l’avait obligé à rester à la maison pendant plusieurs semaines.", "He resumed work with enthusiasm after his long illness that had forced him to stay at home for several weeks."], ["étape", "stage / step", "Nous sommes maintenant à la dernière étape du projet ambitieux qui devrait être terminé avant la fin du mois prochain.", "We are now at the last stage of the ambitious project that should be completed before the end of next month."], ["rigole", "laughs / giggles (from rigoler)", "Elle rigole tout le temps pendant les cours, ce qui rend l’ambiance beaucoup plus légère et agréable pour tout le groupe.", "She laughs all the time during classes, which makes the atmosphere much lighter and more pleasant for the whole group."], ["éclater", "to burst / to explode", "La bulle de savon va probablement éclater d’un moment à l’autre si on continue à la toucher avec les doigts.", "The soap bubble will probably burst any moment if we continue to touch it with our fingers."], ["fusils", "rifles / guns", "Les chasseurs portent toujours leurs fusils bien entretenus quand ils partent en forêt tôt le matin à la recherche de gibier.", "Hunters always carry their well-maintained rifles when they leave for the forest early in the morning in search of game."], ["rattraper", "to catch up", "Je dois absolument rattraper mon retard en mathématiques avant les examens finaux qui approchent à grands pas.", "I absolutely have to catch up on my mathematics delay before the final exams that are approaching fast."], ["éteindre", "to turn off / to extinguish", "Éteignez la lumière avant de sortir de la pièce afin d’économiser de l’électricité et de protéger l’environnement.", "Turn off the light before leaving the room in order to save electricity and protect the environment."], ["séjour", "stay / living room", "Nous avons passé un séjour particulièrement agréable à la montagne cet hiver, profitant de la neige et du grand air pur.", "We had a particularly pleasant stay in the mountains this winter, enjoying the snow and the pure fresh air."], ["ordures", "rubbish / garbage", "Jette toutes les ordures dans la grande poubelle verte qui se trouve derrière la maison, comme d’habitude.", "Throw all the rubbish in the large green trash can that is behind the house, as usual."], ["délire", "delirium / madness / crazy fun (slang)", "C’était un délire total à la fête hier soir, tout le monde dansait et chantait jusqu’au petit matin sans s’arrêter.", "It was total madness at the party last night, everyone was dancing and singing until dawn without stopping."], ["appuie", "leans / presses (from appuyer)", "Appuie fermement sur le bouton rouge pour appeler l’ascenseur qui est souvent très lent dans cet immeuble ancien.", "Press firmly on the red button to call the elevator that is often very slow in this old building."], ["lot", "lot / prize / batch", "Il a gagné le gros lot à la loterie nationale, ce qui a complètement changé sa vie du jour au lendemain de manière inattendue.", "He won the jackpot in the national lottery, which completely changed his life overnight in an unexpected way."], ["levé", "got up / lifted", "Il s’est levé très tôt ce matin afin de terminer son travail avant le début de la réunion importante avec les clients.", "He got up very early this morning in order to finish his work before the start of the important meeting with the clients."], ["enseigne", "sign / teaches (from enseigner)", "L’enseigne lumineuse du magasin est particulièrement visible depuis la rue principale, même la nuit quand tout est fermé.", "The store’s illuminated sign is particularly visible from the main street, even at night when everything is closed."], ["noix", "nut / walnut", "J’adore ajouter des noix croquantes dans ma salade verte pour lui donner plus de goût et de texture.", "I love adding crunchy walnuts to my green salad to give it more flavor and texture."], ["gants", "gloves", "Il fait très froid dehors aujourd’hui, alors n’oublie surtout pas de mettre tes gants en laine avant de sortir.", "It is very cold outside today, so don’t forget to put on your wool gloves before going out."], ["trahison", "betrayal", "La trahison de son meilleur ami l’a profondément blessé et lui a fait perdre confiance dans les relations humaines pendant longtemps.", "The betrayal of his best friend deeply hurt him and made him lose confidence in human relationships for a long time."], ["censée", "supposed to (feminine)", "Elle était censée arriver à huit heures précises pour le dîner, mais elle a finalement eu plus d’une heure de retard à cause des embouteillages.", "She was supposed to arrive at exactly eight o’clock for dinner, but she ended up being more than an hour late because of the traffic jams."], ["enfui", "fled / run away", "Le voleur s’est enfui par la fenêtre de derrière juste avant l’arrivée de la police qui avait été alertée par les voisins.", "The thief fled through the back window just before the police arrived, who had been alerted by the neighbors."], ["livraison", "delivery", "La livraison du colis important est prévue pour demain matin entre neuf heures et midi, comme indiqué sur le site internet.", "The delivery of the important package is scheduled for tomorrow morning between nine o’clock and noon, as indicated on the website."], ["péchés", "sins", "Il confesse régulièrement ses péchés à l’église afin de soulager sa conscience et de retrouver la paix intérieure.", "He regularly confesses his sins at church in order to relieve his conscience and regain inner peace."], ["éloigner", "to move away / to distance", "Il faut absolument s’éloigner du bord de la falaise pour des raisons de sécurité évidentes, surtout quand il y a du vent fort.", "You absolutely have to move away from the edge of the cliff for obvious safety reasons, especially when there is strong wind."], ["foie", "liver", "Le foie de veau est un plat traditionnel français que l’on sert souvent avec une sauce aux oignons caramélisés.", "Calf’s liver is a traditional French dish that is often served with a sauce of caramelized onions."], ["pendu", "hanged / hung", "Le tableau moderne est pendu au mur du salon juste au-dessus du canapé en cuir marron que nous venons d’acheter.", "The modern painting is hung on the living room wall just above the brown leather sofa that we have just bought."], ["tireur", "shooter", "Le tireur d’élite a visé la cible avec une précision remarquable pendant l’entraînement militaire qui a duré toute la journée.", "The elite shooter aimed at the target with remarkable precision during the military training that lasted all day."], ["piquer", "to sting / to prick / to steal (slang)", "Les abeilles peuvent parfois piquer quand on s’approche trop près de leur ruche, ce qui peut être assez douloureux.", "Bees can sometimes sting when you get too close to their hive, which can be quite painful."], ["aile", "wing", "L’aile de l’avion a été légèrement endommagée pendant le vol turbulent, ce qui a obligé le pilote à faire un atterrissage d’urgence.", "The wing of the plane was slightly damaged during the turbulent flight, which forced the pilot to make an emergency landing."], ["vaches", "cows", "Les vaches paissent tranquillement dans le pré vert juste à côté de la ferme où nous avons passé nos vacances cet été.", "The cows graze peacefully in the green meadow right next to the farm where we spent our holidays this summer."], ["gamine", "little girl / kid (slang)", "Cette gamine est vraiment très intelligente pour son âge et pose déjà des questions complexes sur le monde qui l’entoure.", "This little girl is really very intelligent for her age and already asks complex questions about the world around her."], ["roue", "wheel", "La voiture a crevé une roue sur la route de campagne pleine de cailloux, ce qui nous a retardés d’une bonne heure.", "The car had a flat tire on the country road full of stones, which delayed us by a good hour."], ["malédiction", "curse", "Une vieille malédiction semble peser encore sur cette famille ancienne qui rencontre des problèmes depuis plusieurs générations.", "An old curse still seems to weigh on this ancient family that has been encountering problems for several generations."], ["pompes", "pumps / push-ups", "Il fait des pompes tous les matins avant le petit-déjeuner afin de rester en forme et de renforcer ses muscles.", "He does push-ups every morning before breakfast in order to stay in shape and strengthen his muscles."], ["four", "oven / kiln", "Le gâteau au chocolat cuit lentement dans le four chaud pendant que nous préparons la crème fouettée pour l’accompagner.", "The chocolate cake is baking slowly in the hot oven while we prepare the whipped cream to accompany it."], ["saut", "jump", "Il a fait un saut impressionnant par-dessus la barrière pendant la compétition d’athlétisme qui a eu lieu samedi dernier.", "He made an impressive jump over the barrier during the athletics competition that took place last Saturday."], ["avaler", "to swallow", "Il faut avaler ce médicament amer avec un grand verre d’eau afin de ne pas avoir trop mauvais goût dans la bouche.", "You have to swallow this bitter medicine with a large glass of water so as not to have too bad a taste in your mouth."], ["ongles", "fingernails / toenails", "Elle se lime soigneusement les ongles chaque dimanche soir pour qu’ils restent toujours impeccables et bien entretenus.", "She carefully files her nails every Sunday evening so that they always remain impeccable and well maintained."], ["laissons", "let’s leave / let’s allow (from laisser)", "Laissons-les tranquilles un moment, ils ont besoin de discuter calmement entre eux sans notre intervention constante.", "Let’s leave them alone for a moment, they need to discuss calmly among themselves without our constant intervention."], ["irez", "will go (future of aller)", "Vous irez à la plage demain si le temps reste ensoleillé comme prévu par la météo pour le week-end ?", "Will you go to the beach tomorrow if the weather remains sunny as forecasted for the weekend?"], ["orage", "storm", "L’orage approche rapidement avec de gros nuages noirs qui s’accumulent à l’horizon, ce qui annonce probablement de la pluie forte.", "The storm is approaching quickly with big black clouds accumulating on the horizon, which probably announces heavy rain."], ["époux", "husband / spouse", "Son époux est toujours très attentionné et l’aide beaucoup dans les tâches ménagères depuis qu’ils vivent ensemble.", "Her husband is always very attentive and helps her a lot with the household chores since they have been living together."], ["relève", "relief / shift / takes over (from relever)", "C’est maintenant l’heure de la relève pour les infirmières de nuit qui vont prendre la suite de l’équipe de jour.", "It is now time for the night nurses’ shift change who will take over from the day team."], ["singes", "monkeys", "Les singes jouent joyeusement dans les arbres du zoo en lançant des bananes aux visiteurs qui les observent avec amusement.", "The monkeys play joyfully in the zoo trees by throwing bananas to the visitors who watch them with amusement."], ["côtes", "ribs / coasts", "Il s’est cassé deux côtes pendant l’accident de vélo qui a eu lieu la semaine dernière sur la route de montagne.", "He broke two ribs during the bicycle accident that took place last week on the mountain road."], ["nanas", "girls / chicks (slang plural)", "Les nanas s’amusent beaucoup à la soirée en dansant sur la musique entraînante qui passe depuis le début de la nuit.", "The girls are having a lot of fun at the party dancing to the catchy music that has been playing since the beginning of the night."], ["savon", "soap", "J’ai absolument besoin d’un nouveau savon parfumé pour la douche, car l’ancien est complètement fini depuis hier.", "I absolutely need a new scented soap for the shower, because the old one is completely finished since yesterday."], ["ordonné", "ordered / tidy", "Sa chambre est toujours bien ordonnée et parfaitement rangée, ce qui reflète bien son caractère méthodique et organisé.", "His room is always well ordered and perfectly tidy, which reflects his methodical and organized character well."], ["serre", "greenhouse / grip / tightens", "La serre du jardin est pleine de plantes exotiques qu’il cultive avec passion depuis plusieurs années maintenant.", "The garden greenhouse is full of exotic plants that he has been cultivating with passion for several years now."], ["ramasser", "to pick up / to collect", "Ramasse tous tes jouets avant de partir jouer dehors afin que la maison reste propre pour l’arrivée des grands-parents ce soir.", "Pick up all your toys before going out to play so that the house remains clean for the grandparents’ arrival tonight."], ["rembourser", "to reimburse / to pay back", "La banque va rembourser le prêt intégralement après dix années de mensualités régulières et bien gérées.", "The bank will reimburse the loan in full after ten years of regular and well-managed monthly payments."], ["irons", "we will go (future of aller)", "Nous irons au cinéma ce soir si le film qui passe est vraiment intéressant comme l’indiquent les critiques positives.", "We will go to the cinema tonight if the film that is showing is really interesting as indicated by the positive reviews."], ["indice", "clue / index", "La police cherche encore un indice décisif dans cette affaire criminelle complexe qui dure depuis plusieurs mois.", "The police are still looking for a decisive clue in this complex criminal case that has been going on for several months."], ["ailles", "garlic cloves / wings (dialect)", "Les ailles d’ail frais sont déjà dans le frigo, prêtes à être utilisées pour la sauce du dîner de ce soir.", "The fresh garlic cloves are already in the fridge, ready to be used for tonight’s dinner sauce."], ["dégueulasse", "disgusting / gross (slang)", "Ce plat est vraiment dégueulasse à cause de la viande trop cuite et de la sauce qui a un goût bizarre et désagréable.", "This dish is really gross because of the overcooked meat and the sauce that has a weird and unple
