asant taste."], ["trône", "throne", "Le roi est assis fièrement sur son trône doré pendant la cérémonie officielle qui réunit tous les ministres du gouvernement.", "The king is sitting proudly on his golden throne during the official ceremony that brings together all the government ministers."], ["cuir", "leather", "Ce sac à main élégant est fabriqué en cuir véritable de très bonne qualité qui dure facilement pendant de nombreuses années.", "This elegant handbag is made of very good quality real leather that easily lasts for many years."], ["censés", "supposed to (masculine plural)", "Ils étaient censés arriver à l’heure pour le dîner, mais ils ont finalement eu plus d’une heure de retard à cause des embouteillages.", "They were supposed to arrive on time for dinner, but they ended up being more than an hour late because of the traffic jams."], ["éclair", "lightning / flash / éclair (pastry)", "Un éclair brillant a illuminé tout le ciel noir pendant l’orage violent qui a éclaté soudainement cet après-midi.", "A bright flash of lightning illuminated the entire black sky during the violent storm that suddenly broke out this afternoon."], ["tonnerre", "thunder", "Le tonnerre gronde au loin depuis plusieurs minutes, ce qui annonce probablement une pluie forte et continue pour la soirée.", "The thunder has been rumbling in the distance for several minutes, which probably announces heavy and continuous rain for the evening."], ["casque", "helmet", "Porte toujours ton casque quand tu fais du vélo ou de la moto afin d’éviter tout risque de blessure grave à la tête.", "Always wear your helmet when you ride a bike or motorcycle in order to avoid any risk of serious head injury."], ["rate", "spleen / misses / fails (from rater)", "Il rate souvent ses examens à cause du stress important qu’il ressent juste avant de commencer les épreuves écrites.", "He often fails his exams because of the significant stress he feels just before starting the written tests."], ["caution", "deposi ing!"], ["piges", "understand (slang from piger)", "T’as pigé maintenant comment fonctionne le nouveau logiciel après toutes les explications détaillées que je t’ai données ?", "Have you understood now how the new software works after all the detailed explanations I gave you?"], ["serrer", "to tighten / to hug", "Serre-moi fort dans tes bras avant de partir en voyage, car je vais beaucoup te manquer pendant ces deux semaines.", "Hug me tightly in your arms before leaving on the trip, because I am going to miss you a lot during these two weeks."], ["balade", "walk / stroll", "On fait une petite balade dans le parc ce soir après le dîner pour digérer et profiter de l’air frais ?", "Shall we take a little stroll in the park tonight after dinner to digest and enjoy the fresh air?"], ["navrée", "sorry (feminine)", "Je suis vraiment navrée pour le retard important que j’ai pris ce matin à cause des embouteillages inattendus sur l’autoroute.", "I am really sorry for the significant delay I had this morning because of the unexpected traffic jams on the highway."], ["bidon", "fake / belly (slang)", "C’est complètement du bidon cette histoire qu’il raconte depuis le début pour se faire passer pour une victime.", "This story he has been telling from the beginning to pass himself off as a victim is completely fake."], ["vif", "alive / bright / sharp", "Il est particulièrement vif d’esprit et trouve toujours des solutions originales aux problèmes les plus compliqués.", "He is particularly sharp-minded and always finds original solutions to the most complicated problems."], ["fringues", "clothes (slang)", "J’ai acheté de nouvelles fringues à la mode pour la soirée importante qui aura lieu samedi prochain chez des amis.", "I bought new fashionable clothes for the important evening that will take place next Saturday at friends’ house."], ["pareils", "same / similar (plural)", "Ils sont complètement pareils dans leur façon de penser et d’agir, ce qui rend parfois les discussions ass ng forest."], ["crevé", "burst / dead tired (slang)", "Je suis complètement crevé après cette longue journée de travail physique qui a duré plus de douze heures sans pause.", "I am completely dead tired after this long day of physical work that lasted more than twelve hours without a break."], ["poignée", "handle / handful", "Prends une poignée de bonbons dans le bol sur la table avant de partir, car il y en a encore beaucoup.", "Take a handful of candies from the bowl on the table before leaving, because there are still plenty left."], ["conçu", "designed / conceived", "Ce produit est particulièrement bien conçu grâce à l’équipe de designers talentueux qui a travaillé dessus pendant plusieurs mois.", "This product is particularly well designed thanks to the team of talented designers who worked on it for several months."], ["conne", "stupid (feminine vulgar)", "Quelle conne, elle a encore oublié ses clés à l’intérieur de la voiture alors qu’elle venait juste de la fermer !", "What a stupid woman, she forgot her keys inside the car again even though she had just closed it!"], ["aiier", "likely typo for “ailler” or “aller”", "(Le contexte manque complètement pour ce mot qui semble être une erreur de frappe ou une abréviation très rare.)", "(The context is completely missing for this word which seems to be a typing error or a very rare abbreviation.)"], ["pan", "breakdown / flap", "La voiture est encore en panne ce matin malgré les réparations coûteuses que j’ai faites la semaine dernière.", "The car is still broken down this morning despite the expensive repairs I did last week."], ["menottes", "handcuffs", "La police lui a mis les menottes immédiatement après l’arrestation spectaculaire qui a eu lieu dans la rue principale.", "The police put the handcuffs on him immediately after the spectacular arrest that took place on the main street."], ["nique", "fuck (vulgar from niquer)", "Va te faire niquer ailleurs avec tes histoires interminables, car j’en ai vraiment assez de t’écouter depuis une heure !", "Go get fucked somewhere else with your endless stories, because I have really had enough of listening to you for an hour!"], ["épuisé", "exhausted", "Je suis complètement épuisé après cette longue journée de travail intense qui a duré plus de quatorze heures sans pause.", "I am completely exhausted after this long day of intense work that lasted more than fourteen hours without a break."], ["troupeau", "herd / flock", "Le troupeau de moutons traverse calmement le champ vert juste à côté de la ferme où nous passons nos vacances chaque été.", "The flock of sheep calmly crosses the green field right next to the farm where we spend our holidays every summer."], ["touches", "touch / keys (from toucher)", "Ne touche surtout pas à ça, car c’est fragile et risqué de le manipuler sans connaître le fonctionnement exact.", "Don’t touch that at all, because it is fragile and risky to handle it without knowing the exact operation."], ["rompre", "to break", "Il veut rompre le contrat immédiatement à cause des clauses qu’il juge inacceptables et injustes pour son entreprise.", "He wants to break the contract immediately because of the clauses he considers unacceptable and unfair for his company."], ["sienne", "hers / his (possessive feminine)", "C’est la sienne depuis le début, alors il vaut mieux la lui rendre immédiatement sans faire d’histoires inutiles.", "It has been hers from the beginning, so it is better to give it back to her immediately without making unnecessary fuss."], ["maquillage", "make-up", "Elle met toujours du maquillage léger avant de sortir afin d’avoir une apparence soignée et féminine pour la journée.", "She always puts on light make-up before going out in order to have a neat and feminine appearance for the day."], ["vachement", "very / really (slang)", "C’est vachement bien ce nouveau restaurant italien qui vient d’ouvrir près de chez moi la semaine dernière !", "It is really good this new Italian restaurant that just opened near my house last week!"], ["taureau", "bull", "Le taureau charge avec force dans l’arène pendant la corrida traditionnelle qui attire beaucoup de touristes chaque été.", "The bull charges with force in the arena during the traditional bullfight that attracts many tourists every summer."], ["navette", "shuttle", "La navette spatiale est prête au décollage après plusieurs mois de préparation intensive par l’équipe internationale.", "The space shuttle is ready for takeoff after several months of intensive preparation by the international team."], ["poils", "hairs / fur", "Le chat perd beaucoup de poils en ce moment à cause du changement de saison qui arrive progressivement.", "The cat is losing a lot of fur at the moment because of the seasonal change that is gradually arriving."], ["subi", "undergone / suffered", "Il a subi une lourde perte financière après l’échec complet du projet ambitieux qu’il avait lancé il y a deux ans.", "He suffered a heavy financial loss after the complete failure of the ambitious project he had launched two years ago."], ["raccroche", "hangs up (from raccrocher)", "Il raccroche le téléphone brutalement après une dispute violente avec son supérieur hiérarchique ce matin.", "He hangs up the phone abruptly after a violent argument with his hierarchical superior this morning."], ["baraque", "shack / house (slang)", "C’est une belle baraque moderne qu’il vient d’acheter dans le quartier résidentiel calme près de la forêt.", "It is a beautiful modern house that he has just bought in the quiet residential neighborhood near the forest."], ["filet", "net / fillet", "Le pêcheur lance son grand filet dans l’eau calme de la rivière pour essayer d’attraper quelques poissons frais pour le dîner.", "The fisherman throws his large net into the calm river water to try to catch a few fresh fish for dinner."], ["planque", "hideout / stash (slang)", "Il a une planque secrète dans la montagne où il cache tout son matériel de camping pour les week-ends improvisés.", "He has a secret hideout in the mountain where he hides all his camping gear for the improvised weekends."], ["péter", "to fart / to explode (slang)", "Arrête de péter sans arrêt pendant le film, car cela devient vraiment gênant pour tout le monde dans la salle de cinéma.", "Stop farting non-stop during the film, because it is becoming really embarrassing for everyone in the cinema."], ["gré", "will / liking", "Il fait tout à son gré sans jamais demander l’avis des autres, ce qui crée parfois des tensions inutiles dans le groupe.", "He does everything as he pleases without ever asking for the opinion of others, which sometimes creates unnecessary tensions in the group."], ["gênant", "embarrassing / awkward", "C’est vraiment gênant de parler de ça en public, surtout quand tout le monde écoute avec beaucoup d’attention.", "It is really embarrassing to talk about this in public, especially when everyone is listening with great attention."], ["allure", "appearance / pace", "Elle a vraiment de l’allure dans cette robe élégante qu’elle porte pour la première fois ce soir à la soirée.", "She really has style in this elegant dress that she is wearing for the first time tonight at the party."], ["pénible", "painful / annoying", "Ce travail répétitif est particulièrement pénible à la longue, surtout quand il faut le faire tous les jours sans pause.", "This repetitive work is particularly annoying in the long run, especially when you have to do it every day without a break."], ["pété", "burst / drunk (slang)", "La balle a complètement pété le ballon pendant le match de football qui a eu lieu hier après-midi dans le parc.", "The ball completely burst the balloon during the football match that took place yesterday afternoon in the park."], ["jules", "boyfriend (slang)", "Son jules est particulièrement jaloux depuis qu’elle a commencé à sortir plus souvent avec ses amis du travail.", "Her boyfriend is particularly jealous since she started going out more often with her work friends."], ["lâches", "cowards (plural)", "Ce sont vraiment des lâches de ne pas oser dire la vérité en face alors que tout le monde sait ce qui s’est passé.", "They are really cowards for not daring to tell the truth face to face even though everyone knows what happened."], ["intime", "intimate / private", "C’est un moment particulièrement intime et privé qu’ils partagent depuis plusieurs mois maintenant dans leur relation.", "It is a particularly intimate and private moment that they have been sharing for several months now in their relationship."], ["trompée", "cheated (feminine)", "Elle s’est sentie profondément trompée par son mari qui avait une liaison secrète depuis plusieurs mois.", "She felt deeply cheated by her husband who had a secret affair for several months."], ["morgue", "morgue / arrogance", "Le corps de la victime a été transporté à la morgue pour une autopsie complète après la découverte macabre dans la forêt.", "The victim’s body was transported to the morgue for a complete autopsy after the macabre discovery in the forest."]];

// Build decks by first letter
const DECK_ALL = 'All cards (' + ALL_CARDS.length + ')';
const decks = { [DECK_ALL]: ALL_CARDS };
ALL_CARDS.forEach(c => {
  const letter = c[0][0].toUpperCase();
  if (!decks[letter]) decks[letter] = [];
  decks[letter].push(c);
});

let current = DECK_ALL, cards = [], idx = 0, flipped = false;
let frVoice = null, playing = false, playTimer = null;
const PLAY_DELAY = 2800;

function loadVoices() {
  const v = window.speechSynthesis.getVoices();
  frVoice = v.find(x => x.lang === 'fr-FR') || v.find(x => x.lang.startsWith('fr')) || null;
}
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }

function speakText(word, sentence, onDone) {
  if (!window.speechSynthesis) { onDone && onDone(); return; }
  window.speechSynthesis.cancel();
  const text = word + '. ' + sentence;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR'; utt.rate = 0.88; utt.pitch = 1.0;
  if (frVoice) utt.voice = frVoice;
  utt.onend = () => { onDone && onDone(); };
  utt.onerror = () => { onDone && onDone(); };
  window.speechSynthesis.speak(utt);
}

function speakCurrent(e) {
  e && e.stopPropagation();
  if (!cards[idx]) return;
  const btn = document.getElementById('speakBtn'), lbl = document.getElementById('speakLabel');
  btn.classList.add('speaking'); lbl.textContent = 'Speaking…';
  speakText(cards[idx][0], cards[idx][2], () => {
    btn.classList.remove('speaking'); lbl.textContent = 'Pronounce';
  });
}

function init() {
  const sel = document.getElementById('deckSel');
  sel.innerHTML = Object.keys(decks).map(k =>
    `<option value="${k}">${k}${k === DECK_ALL ? '' : ' (' + decks[k].length + ')'}</option>`
  ).join('');
  restart();
}

function switchDeck() { current = document.getElementById('deckSel').value; stopPlay(); restart(); }
function shuffle() {
  cards = [...(decks[current] || [])];
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  idx = 0; stopPlay(); showCard();
}
function restart() { cards = [...(decks[current] || [])]; idx = 0; stopPlay(); showCard(); }

function showCard() {
  if (!cards.length) return;
  flipped = false;
  const c = cards[idx];
  document.getElementById('card').className = 'card';
  document.getElementById('sideTag').textContent = 'French · Front';
  document.getElementById('frontView').style.display = '';
  document.getElementById('backView').style.display = 'none';
  document.getElementById('fWord').textContent = c[0];
  document.getElementById('fSentence').textContent = c[2];
  document.getElementById('speakLabel').textContent = 'Pronounce';
  document.getElementById('speakBtn').classList.remove('speaking');
  document.getElementById('counter').textContent = (idx + 1) + ' of ' + cards.length;
  document.getElementById('prog').style.width = Math.round((idx / (cards.length - 1 || 1)) * 100) + '%';
}

function showBack() {
  if (!cards[idx]) return;
  const c = cards[idx];
  flipped = true;
  document.getElementById('card').className = 'card back';
  document.getElementById('sideTag').textContent = 'English · Back';
  document.getElementById('frontView').style.display = 'none';
  document.getElementById('backView').style.display = '';
  document.getElementById('bWord').textContent = c[1];
  document.getElementById('bSentence').textContent = c[3];
}

function flip() {
  if (!cards[idx]) return;
  if (!flipped) { showBack(); } else { showCard(); }
}

function prevCard() { stopPlay(); if (idx > 0) { idx--; showCard(); } }
function nextCard() { stopPlay(); if (idx < cards.length - 1) { idx++; showCard(); } }
function togglePlay() { if (playing) { stopPlay(); } else { startPlay(); } }

function startPlay() {
  playing = true;
  document.getElementById('playBtn').textContent = '■ Stop';
  document.getElementById('playBtn').classList.add('active');
  playStep();
}

const FRONT_PAUSE = 600;
function playStep() {
  if (!playing) return;
  showCard();
  document.getElementById('playInfo').textContent = 'Playing ' + (idx + 1) + ' of ' + cards.length + '…';
  speakText(cards[idx][0], cards[idx][2], () => {
    if (!playing) return;
    playTimer = setTimeout(() => {
      if (!playing) return;
      showBack();
      playTimer = setTimeout(() => {
        if (!playing) return;
        if (idx < cards.length - 1) { idx++; playStep(); }
        else { stopPlay(); document.getElementById('playInfo').textContent = 'Done — all ' + cards.length + ' cards played.'; }
      }, PLAY_DELAY);
    }, FRONT_PAUSE);
  });
}

function stopPlay() {
  playing = false; clearTimeout(playTimer);
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('playBtn').textContent = '▶ Play All';
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playInfo').textContent = '';
}

document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); flip(); }
  else if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
});

init();
</script>
