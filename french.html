<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French B2 Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px;padding:16px}
.app{max-width:600px;margin:0 auto;padding:1rem 0}
h1{font-size:18px;font-weight:600;margin-bottom:14px;color:#1a1a18;letter-spacing:-.01em}
h1 span{font-size:12px;font-weight:400;color:#888;margin-left:6px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar input{font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid #c0bdb4;background:#fff;color:#1a1a18;flex:1;min-width:160px;outline:none}
.toolbar input:focus{border-color:#185FA5}
.toolbar button{font-size:13px;padding:6px 12px;white-space:nowrap;border-radius:8px;border:0.5px solid #c0bdb4;background:#fff;color:#1a1a18;cursor:pointer}
.toolbar button:hover{background:#f0ede8}
.progress-bar{height:4px;background:#dddad2;border-radius:2px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:#185FA5;border-radius:2px;transition:width .3s}
.card-area{cursor:pointer;user-select:none;margin-bottom:14px}
.card{background:#fff;border:0.5px solid #c0bdb4;border-radius:12px;padding:28px 24px 20px;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:border-color .15s}
.card:hover{border-color:#888}
.card.back{background:#f5f4f0}
.side-tag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:16px}
.front-word{font-size:52px;line-height:1.1;color:#1a1a18;margin-bottom:12px;font-style:italic}
.front-sentence{font-size:14px;color:#444;line-height:1.6;margin-bottom:14px;font-style:italic;max-width:480px}
.front-hint{font-size:13px;color:#aaa;margin-bottom:14px}
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:0.5px solid #c0bdb4;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:border-color .15s,background .15s}
.speak-btn:hover{border-color:#888;background:#f5f4f0}
.speak-btn.speaking{border-color:#185FA5;color:#185FA5;background:#e6f1fb}
.speak-icon{width:16px;height:16px;flex-shrink:0}
.back-translation{font-size:30px;font-weight:600;color:#1a1a18;margin-bottom:16px;line-height:1.2}
.back-sentence{font-size:15px;color:#333;line-height:1.6;margin-bottom:10px;font-style:italic;max-width:480px}
.back-sentence-en{font-size:13px;color:#185FA5;line-height:1.5;max-width:480px}
.counter{font-size:12px;color:#888;margin-top:16px}
.nav{display:flex;gap:8px;margin-bottom:4px;align-items:center}
.nav button{flex:1;padding:10px;font-size:13px;font-weight:500;border-radius:8px;border:0.5px solid #c0bdb4;background:#fff;color:#1a1a18;cursor:pointer}
.nav button:hover{background:#f0ede8}
.btn-play{border-color:#185FA5 !important;color:#0C447C !important}
.btn-play:hover{background:#e6f1fb !important}
.btn-play.active{background:#185FA5 !important;color:#fff !important;border-color:#185FA5 !important}
.play-info{font-size:11px;color:#888;text-align:center;margin-bottom:10px;min-height:16px}
.search-count{font-size:11px;color:#888;margin-bottom:8px;text-align:right}
</style>
</head>
<body>
<div class="app">
  <h1>French B2 Vocabulary <span>526 words</span></h1>
  <div class="toolbar">
    <input id="searchBox" type="text" placeholder="🔍 Filter cards…" oninput="filterCards()">
    <button onclick="shuffle()">Shuffle</button>
    <button onclick="restart()">Restart</button>
  </div>
  <div class="search-count" id="searchCount"></div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="card-area" onclick="flip()">
    <div class="card" id="card">
      <div class="side-tag" id="sideTag">French · Front</div>
      <div id="frontView">
        <div class="front-word" id="fWord"></div>
        <div class="front-sentence" id="fSentence"></div>
        <button class="speak-btn" id="speakBtn" onclick="speakCurrent(event)">
          <svg class="speak-icon" viewBox="0 0 16 16" fill="none">
            <path d="M9 2.5C9 2.5 11.5 4 11.5 8C11.5 12 9 13.5 9 13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M12 1C12 1 15 3.5 15 8C15 12.5 12 15 12 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <rect x="1" y="5.5" width="4" height="5" rx="1" fill="currentColor" opacity="0.8"/>
            <path d="M5 6L8.5 3.5V12.5L5 10" fill="currentColor" opacity="0.8"/>
          </svg>
          <span id="speakLabel">Pronounce</span>
        </button>
      </div>
      <div id="backView" style="display:none">
        <div class="back-translation" id="bTranslation"></div>
        <div class="back-sentence-en" id="bSentenceEn"></div>
      </div>
      <div class="counter" id="counter"></div>
    </div>
  </div>
  <div class="nav">
    <button onclick="prevCard()">← Previous</button>
    <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ Play All</button>
    <button onclick="nextCard()">Next →</button>
  </div>
  <div class="play-info" id="playInfo"></div>
</div>

<script>
const ALL = [["ceinture","belt / seatbelt","Il est impératif d'attacher sa ceinture avant que la voiture ne démarre.","It is imperative to fasten your seatbelt before the car starts."],["digne","worthy / dignified","Malgré la défaite, son comportement est resté digne et respectueux.","Despite the defeat, his behavior remained dignified and respectful."],["gâcher","to ruin / to waste","Je refuse de te laisser gâcher cette opportunité professionnelle unique.","I refuse to let you ruin this unique professional opportunity."],["prises","taken / decisions / plugs","Les mesures prises par le gouvernement semblent insuffisantes pour régler la crise.","The measures taken by the government seem insufficient to resolve the crisis."],["congé","leave / day off","Elle a demandé un congé sans solde pour pouvoir voyager à travers l'Europe.","She requested unpaid leave so she could travel across Europe."],["repartir","to leave again / to start over","Après cet échec, il va falloir repartir de zéro pour reconstruire le projet.","After this failure, we will have to start from scratch to rebuild the project."],["pourri","rotten / corrupt","Si ce fruit est pourri, il ne faut surtout pas le consommer.","If this fruit is rotten, you absolutely must not consume it."],["bétail","livestock","L'éleveur veille à ce que son bétail soit bien nourri pendant l'hiver.","The breeder ensures that his livestock is well fed during the winter."],["bonté","goodness / kindness","Elle a fait preuve d'une grande bonté envers ceux qui l'avaient trahie.","She showed great kindness toward those who had betrayed her."],["bouffer","to eat (slang) / to consume","Ce vieux moteur a tendance à bouffer énormément d'huile.","This old engine tends to consume a huge amount of oil."],["guérir","to cure / to heal","Le médecin espère que ce nouveau traitement parviendra à le guérir rapidement.","The doctor hopes this new treatment will manage to cure him quickly."],["coule","flows / sinks","L'eau de cette rivière coule paisiblement jusqu'à la mer.","The water of this river flows peacefully to the sea."],["enlevez","remove / take off","Je vous prie d'enlevez vos chaussures avant d'entrer dans la maison.","Please take off your shoes before entering the house."],["piqué","stung / piqued / stolen","Sa curiosité a été piquée par cette révélation totalement inattendue.","His curiosity was piqued by this totally unexpected revelation."],["remise","discount / shed / delivery","Le magasin accorde une remise exceptionnelle de vingt pour cent aux étudiants.","The store grants an exceptional twenty percent discount to students."],["sou","penny / cent","Après son licenciement, il s'est retrouvé sans le moindre sou en poche.","After his dismissal, he found himself without a single penny in his pocket."],["abattre","to slaughter / to shoot down / to knock down","La tempête a été si violente qu'elle a réussi à abattre le vieux chêne.","The storm was so violent that it managed to knock down the old oak."],["dégâts","damage","Les inondations ont causé des dégâts matériels considérables dans la région.","The floods caused considerable material damage in the region."],["serré","tight / squeezed","Ce pantalon est beaucoup trop serré pour que je sois à l'aise.","These pants are much too tight for me to be comfortable."],["merveille","marvel / wonder","Ce gâteau au chocolat est une véritable merveille culinaire.","This chocolate cake is a true culinary marvel."],["cercueil","coffin","Le cercueil a été descendu lentement dans la fosse lors de la cérémonie.","The coffin was lowered slowly into the grave during the ceremony."],["gâché","ruined / wasted","Quel dommage d'avoir gâché autant de talent par manque de discipline !","What a shame to have wasted so much talent due to a lack of discipline!"],["bourré","drunk / packed","Il est rentré complètement bourré après la fête d'hier soir.","He came home completely drunk after the party last night."],["casier","locker / criminal record","Avant de l'embaucher, l'entreprise a exigé un extrait de son casier judiciaire.","Before hiring him, the company requested an excerpt of his criminal record."],["pouce","thumb","Il a levé le pouce pour me signaler que tout allait bien.","He gave a thumbs up to signal to me that everything was fine."],["joint","joint / seal / attached","Veuillez trouver ci-joint le document récapitulant nos accords précédents.","Please find attached the document summarizing our previous agreements."],["poubelle","trash can","Pense à jeter ces vieux papiers dans la poubelle avant de partir.","Remember to throw these old papers in the trash can before leaving."],["panier","basket","J'ai rempli mon panier de fruits frais au marché ce matin.","I filled my basket with fresh fruit at the market this morning."],["cendres","ashes","La maison a été entièrement réduite en cendres par le terrible incendie.","The house was completely reduced to ashes by the terrible fire."],["matinée","morning","Nous avons passé toute la matinée à débattre des nouveaux objectifs de l'année.","We spent the entire morning debating the new objectives for the year."],["viol","rape","Le suspect a été mis en examen pour des accusations de viol aggravé.","The suspect was indicted on charges of aggravated rape."],["pendre","to hang","Il a décidé de pendre ce tableau dans le salon pour décorer le mur.","He decided to hang this painting in the living room to decorate the wall."],["anneau","ring","Le magicien a fait disparaître l'anneau sous les yeux ébahis du public.","The magician made the ring disappear before the amazed eyes of the audience."],["grève","strike","Les syndicats ont appelé à une grève générale pour protester contre la réforme.","The unions called for a general strike to protest the reform."],["couches","layers / diapers","Il a fallu appliquer trois couches de peinture pour masquer la tache murale.","It was necessary to apply three layers of paint to hide the wall stain."],["saigne","bleeds","Appelle vite un médecin, sa blessure saigne abondamment et ne s'arrête pas.","Call a doctor quickly, his wound is bleeding heavily and won't stop."],["tache","stain / spot","J'ai eu beaucoup de mal à faire partir cette tache de vin sur la nappe.","I had a lot of trouble getting this wine stain out of the tablecloth."],["cuit","cooked / baked","Ce rôti est parfaitement cuit, la viande est tendre et juteuse.","This roast is perfectly cooked, the meat is tender and juicy."],["repéré","spotted / located","Le voleur a été repéré par les caméras de sécurité du centre commercial.","The thief was spotted by the security cameras in the mall."],["foudre","lightning","La foudre a frappé le clocher de l'église pendant le violent orage d'hier.","Lightning struck the church steeple during yesterday's violent storm."],["poil","hair (animal or body)","Mon chat a un poil tellement soyeux qu'on a toujours envie de le caresser.","My cat has such silky hair that you always want to pet it."],["panne","breakdown / failure","Mon ordinateur est tombé en panne juste avant que je sauvegarde mon travail.","My computer broke down right before I saved my work."],["soigner","to treat / to care for","L'infirmière fait de son mieux pour soigner les patients avec douceur.","The nurse does her best to treat the patients gently."],["vedette","star (celebrity) / speedboat","Elle est devenue une véritable vedette de cinéma après son dernier film.","She became a true movie star after her last film."],["sonné","stunned / rang","Le boxeur a été complètement sonné par ce dernier coup de poing.","The boxer was completely stunned by that last punch."],["embête","bothers / annoys","Ça m'embête vraiment de devoir annuler notre rendez-vous à la dernière minute.","It really bothers me to have to cancel our appointment at the last minute."],["pognon","money (slang)","Il a dépensé tout son pognon dans des jeux de hasard sans réfléchir.","He spent all his money on gambling without thinking."],["tient","holds / keeps","Elle tient à ce que tout soit parfait pour l'anniversaire de son fils.","She insists that everything be perfect for her son's birthday."],["soin","care / treatment","Il faut prendre grand soin de ces plantes si l'on veut qu'elles fleurissent.","You must take great care of these plants if you want them to bloom."],["preuve","proof / evidence","Le procureur manque de preuves tangibles pour condamner cet individu.","The prosecutor lacks tangible evidence to convict this individual."],["mignon","cute","Ton petit chien est vraiment mignon quand il essaie d'attraper sa queue.","Your little dog is really cute when it tries to catch its tail."],["vitesse","speed","Il a été flashé par la police parce qu'il roulait à une vitesse excessive.","He was caught by the speed camera because he was driving at an excessive speed."],["menti","lied","J'ai découvert qu'il m'avait menti sur ses véritables intentions.","I discovered that he had lied to me about his true intentions."],["enceinte","pregnant / speaker / enclosure","Elle est enceinte de six mois et prépare activement l'arrivée du bébé.","She is six months pregnant and actively preparing for the baby's arrival."],["savons","we know / soaps","Nous savons pertinemment que ce projet comportera des risques importants.","We know full well that this project will entail significant risks."],["toit","roof","Les réparations du toit coûteront cher à cause des dégâts causés par la grêle.","The roof repairs will be expensive because of the damage caused by the hail."],["queue","tail / line","Nous avons fait la queue pendant deux heures pour entrer dans le musée.","We waited in line for two hours to get into the museum."],["cesse","stops / ceases","Il pleut sans cesse depuis ce matin, ce qui rend la conduite dangereuse.","It has been raining non-stop since this morning, making driving dangerous."],["os","bone","Le chien a passé l'après-midi entière à ronger son os dans le jardin.","The dog spent the entire afternoon gnawing on his bone in the garden."],["ventre","belly / stomach","J'ai une douleur atroce au ventre, je pense avoir mangé quelque chose de mauvais.","I have a terrible pain in my stomach; I think I ate something bad."],["amené","brought","La situation l'a amené à prendre des décisions qu'il regrette aujourd'hui.","The situation brought him to make decisions that he regrets today."],["milliers","thousands","Des milliers de manifestants se sont rassemblés sur la place principale.","Thousands of protesters gathered in the main square."],["gorge","throat / gorge","J'ai mal à la gorge, je crois que j'attrape un mauvais rhume.","My throat hurts, I think I'm catching a bad cold."],["ombre","shadow / shade","Il vaut mieux se reposer à l'ombre de cet arbre en attendant que le soleil se couche.","It is better to rest in the shade of this tree while waiting for the sun to set."],["épée","sword","Le chevalier tira son épée de son fourreau, prêt à affronter son adversaire.","The knight drew his sword from its scabbard, ready to face his opponent."],["fuir","to flee / to run away","Devant l'avancée de l'incendie, les habitants n'ont eu d'autre choix que de fuir.","Faced with the advancing fire, the inhabitants had no choice but to flee."],["souci","worry / problem","Ne te fais pas de souci, je m'occuperai de tout pendant ton absence.","Don't worry, I will take care of everything while you're away."],["dégagez","clear out / get out (imperative)","Dégagez le passage immédiatement pour laisser passer l'ambulance !","Clear the way immediately to let the ambulance pass!"],["menteur","liar","Il a la réputation d'être un grand menteur, alors ne crois pas tout ce qu'il dit.","He has a reputation for being a big liar, so don't believe everything he says."],["semblant","pretending / fake","Il a fait semblant de ne pas me voir pour éviter de me saluer.","He pretended not to see me to avoid greeting me."],["douche","shower","Après une longue séance de sport, rien ne vaut une bonne douche chaude.","After a long sports session, nothing beats a good hot shower."],["chaleur","heat","La chaleur étouffante de l'été nous oblige à rester à l'intérieur l'après-midi.","The stifling summer heat forces us to stay indoors in the afternoon."],["monté","gone up / climbed / mounted","Il a monté les escaliers quatre à quatre pour arriver à l'heure à sa réunion.","He bounded up the stairs to arrive on time for his meeting."],["bat","beats / hits","Mon cœur bat très fort à chaque fois que je dois parler en public.","My heart beats very fast every time I have to speak in public."],["titres","titles / headlines","Les journaux ont consacré leurs grands titres à cet événement politique majeur.","The newspapers devoted their headlines to this major political event."],["singe","monkey / ape","Le singe a grimpé tout en haut de l'arbre avec une agilité déconcertante.","The monkey climbed to the very top of the tree with disconcerting agility."],["ours","bear","Lors de notre randonnée, nous avons aperçu un ours au loin dans la vallée.","During our hike, we spotted a bear in the distance in the valley."],["navire","ship","Le navire a quitté le port à l'aube en direction des eaux internationales.","The ship left the port at dawn heading for international waters."],["laisses","leashes / you leave","Pourquoi laisses-tu toujours tes affaires traîner au milieu du salon ?","Why do you always leave your things lying around in the middle of the living room?"],["aube","dawn","Nous devrons nous lever à l'aube pour éviter les embouteillages.","We will have to wake up at dawn to avoid the traffic jams."],["nana","girl / chick (slang)","C'est une nana très intelligente qui sait exactement ce qu'elle veut dans la vie.","She's a very smart girl who knows exactly what she wants in life."],["hais","hate","Je te hais de m'avoir menti sur un sujet aussi grave et important.","I hate you for lying to me about such a serious and important subject."],["soi","oneself","Il est essentiel d'avoir confiance en soi pour réussir dans ce métier compétitif.","It is essential to have self-confidence to succeed in this competitive profession."],["tir","shot / shooting","Le policier a effectué un tir de sommation pour effrayer le suspect.","The police officer fired a warning shot to frighten the suspect."],["prennent","take","Il est surprenant qu'ils ne prennent pas cette menace plus au sérieux.","It is surprising that they don't take this threat more seriously."],["foyer","household / hearth / home","Ce jeune couple a décidé de fonder un foyer peu après leur mariage.","This young couple decided to start a household shortly after their wedding."],["porc","pork / pig","La consommation de viande de porc est interdite dans certaines religions.","The consumption of pork meat is forbidden in certain religions."],["ravie","delighted","Je suis ravie de faire votre connaissance après avoir tant entendu parler de vous.","I am delighted to meet you after hearing so much about you."],["sonne","rings / sounds","Dès que la cloche sonne, les élèves se précipitent dans la cour de récréation.","As soon as the bell rings, the students rush into the playground."],["soif","thirst","J'ai une telle soif que je pourrais boire un litre d'eau d'un seul coup.","I have such a thirst that I could drink a liter of water in one gulp."],["haine","hatred","La guerre a engendré une haine profonde entre les deux nations voisines.","The war engendered a deep hatred between the two neighboring nations."],["barre","bar","Il a utilisé une barre de fer pour faire levier et ouvrir la lourde porte.","He used an iron bar as a lever to open the heavy door."],["empreintes","footprints / fingerprints","La police scientifique a relevé des empreintes digitales sur la poignée.","Forensics lifted fingerprints from the handle."],["proches","close / relatives","J'ai invité seulement ma famille et mes amis les plus proches à mon anniversaire.","I invited only my family and closest friends to my birthday."],["enfuir","to run away / to escape","Le prisonnier a tenté de s'enfuir en profitant d'un moment d'inattention du gardien.","The prisoner tried to escape by taking advantage of a moment of inattention from the guard."],["ménage","household / cleaning","Faire le ménage tous les week-ends prend un temps considérable.","Doing the cleaning every weekend takes a considerable amount of time."],["pareille","similar / such","Je n'avais jamais vu une chose pareille de toute ma vie.","I had never seen such a thing in my entire life."],["soucis","worries","Malgré ses problèmes financiers, il essaie de cacher ses soucis à ses enfants.","Despite his financial problems, he tries to hide his worries from his children."],["rater","to miss / to fail","Dépêche-toi, sinon nous allons rater notre train pour Paris !","Hurry up, or else we are going to miss our train to Paris!"],["emmené","taken (a person) / brought","Le suspect a été emmené au commissariat pour un interrogatoire approfondi.","The suspect was taken to the police station for a thorough interrogation."],["tromper","to deceive / to cheat","Il est facile de se tromper lorsqu'on lit un texte trop rapidement.","It is easy to make a mistake when reading a text too quickly."],["trompé","deceived / mistaken","J'ai bien peur de m'être trompé d'adresse en venant ici.","I'm afraid I got the wrong address coming here."],["cadavre","corpse","Les enquêteurs ont découvert un cadavre dissimulé dans le coffre de la voiture.","Investigators discovered a corpse hidden in the trunk of the car."],["meurtres","murders","Le détective enquête sur une série de meurtres non élucidés dans la région.","The detective is investigating a series of unsolved murders in the region."],["juré","sworn / jury member","J'ai juré de garder ce secret jusqu'à la fin de mes jours.","I swore to keep this secret until the end of my days."],["miel","honey","Je bois toujours mon thé avec une cuillère de miel pour adoucir le goût.","I always drink my tea with a spoonful of honey to sweeten the taste."],["sable","sand","Les enfants s'amusent à co né au moment précis où j'avais le plus besoin de son soutien financier.","He cowardly let me down at the exact moment I needed his financial support the most."],["culotte","panties / underwear","Mettre sa culotte à l'envers le matin est souvent considéré avec humour comme un signe d'étourderie.","Putting your panties on inside out in the morning is often humorously considered a sign of absent-mindedness."],["fouiller","to search","Les douaniers ont eu le droit de fouiller systématiquement tous les bagages des passagers du vol.","Customs officers had the right to systematically search all the luggage of the flight's passengers."],["machin","thing / whatchamacallit","Peux-tu me passer ce petit machin en plastique qui sert à ouvrir les bouteilles de vin ?","Can you pass me that little plastic thingy used to open wine bottles?"],["lié","linked / bound","Le déclin économique de cette région est directement lié à la fermeture de sa principale usine.","The economic decline of this region is directly linked to the closure of its main factory."],["pétrin","mess / jam (slang)","En omettant de déclarer ses impôts, il s'est mis dans un pétrin juridique inimaginable.","By failing to declare his taxes, he got himself into an unimaginable legal mess."],["serrer","to tighten / to squeeze / to shake","Les deux diplomates se sont souri avant de se serrer vigoureusement la main devant les journalistes.","The two diplomats smiled at each other before vigorously shaking hands in front of the journalists."],["balade","stroll / walk","Nous avons profité du beau temps dominical pour faire une longue balade en forêt.","We took advantage of the beautiful Sunday weather to go for a long walk in the forest."],["navrée","deeply sorry / heartbroken","Je suis sincèrement navrée de vous annoncer cette terrible nouvelle concernant votre investissement.","I am sincerely sorry to announce this terrible news regarding your investment."],["bidon","phony / fake (slang) / jerrycan","L'excuse qu'il a fournie pour justifier son absence à la réunion était totalement bidon.","The excuse he provided to justify his absence at the meeting was totally phony."],["vif","sharp / alive / vivid","Il a un esprit très vif, ce qui lui permet de comprendre des concepts complexes instantanément.","He has a very sharp mind, which allows him to understand complex concepts instantly."],["fringues","clothes (slang)","Elle a dépensé presque tout son premier salaire pour s'acheter de nouvelles fringues de marque.","She spent almost all of her first paycheck to buy herself new designer clothes."],["pareils","similar / such (plural)","Des événements pareils ne devraient jamais se reproduire dans une société civilisée.","Such events should never happen again in a civilized society."],["douceur","softness / gentleness","L'infirmière lui a parlé avec une telle douceur qu'il a immédiatement oublié sa douleur.","The nurse spoke to him with such gentleness that he immediately forgot his pain."],["tendu","tense / stretched","Le climat social est actuellement très tendu à la suite de l'annonce des réformes économiques.","The social climate is currently very tense following the announcement of the economic reforms."],["coincée","stuck / uptight","La clé est restée coincée dans la serrure rouillée et il m'a été impossible de la retirer.","The key got stuck in the rusty lock and it was impossible for me to remove it."],["toc","fake / knock-off","Les bijoux magnifiques qu'elle porte ne sont en réalité que du toc acheté sur un marché.","The magnificent jewelry she wears is actually just fake jewelry bought at a market."],["sien","his / hers","J'ai oublié mon ordinateur portable, alors mon collègue m'a gentiment prêté le sien.","I forgot my laptop, so my colleague kindly lent me his."],["lame","blade","La lame de ce couteau de chef japonais est extrêmement tranchante et nécessite une grande prudence.","The blade of this Japanese chef's knife is extremely sharp and requires great caution."],["crevé","exhausted / burst (slang)","Après avoir travaillé plus de quatorze heures d'affilée, je rentre chez moi complètement crevé.","After working more than fourteen hours straight, I am going home completely exhausted."],["poignée","handful / handle","J'ai ajouté une petite poignée d'amandes effilées à la préparation du gâteau pour le croquant.","I added a small handful of sliced almonds to the cake batter for crunch."],["conçu","designed / conceived","Ce logiciel innovant a été spécialement conçu pour faciliter la gestion des ressources humaines.","This innovative software was specially designed to facilitate human resources management."],["allure","pace / appearance","La voiture de sport roulait à une allure folle sur la petite route sinueuse de la montagne.","The sports car was driving at a crazy pace on the small winding mountain road."],["pénible","annoying / difficult","C'est vraiment pénible de devoir recommencer ce long travail administratif depuis le début.","It is really annoying to have to start this long administrative work all over again from the beginning."],["jules","boyfriend (slang)","Elle a passé tout le week-end romantique à Paris en compagnie de son nouveau jules.","She spent the whole romantic weekend in Paris in the company of her new boyfriend."],["lâches","cowards","Les personnes qui s'attaquent anonymement aux autres sur Internet sont souvent de profonds lâches.","People who anonymously attack others on the internet are often profound cowards."],["intime","intimate","Nous avons organisé un dîner très intime, réservé uniquement à notre famille et à nos amis proches.","We organized a very intimate dinner, reserved only for our family and close friends."],["trompée","cheated on / mistaken","Elle s'est lourdement trompée de date en réservant les billets d'avion pour notre voyage de noces.","She was heavily mistaken about the date when booking the plane tickets for our honeymoon."],["morgue","morgue / arrogance","L'inspecteur s'est rendu directement à la morgue pour procéder à l'identification officielle du corps.","The inspector went directly to the morgue to proceed with the official identification of the body."],["troupeau","herd / flock","Le troupeau d'éléphants se dirigeait lentement vers le point d'eau situé de l'autre côté de la savane.","The herd of elephants was slowly heading toward the watering hole located on the other side of the savanna."],["touches","keys / touches","J'ai renversé du café sur le clavier et maintenant certaines touches ne fonctionnent plus du tout.","I spilled coffee on the keyboard and now some keys don't work at all anymore."],["rompre","to break / to break up","Après dix ans de relation tumultueuse, ils ont finalement décidé de rompre de façon définitive.","After ten years of a tumultuous relationship, they finally decided to break up permanently."],["sienne","hers / his","Sa méthode de travail est radicalement différente de la sienne, mais les deux sont efficaces.","His working method is radically different from hers, but both are effective."],["maquillage","makeup","L'actrice a passé plus de deux heures dans la loge pour perfectionner son maquillage de scène.","The actress spent over two hours in the dressing room perfecting her stage makeup."],["vachement","really / very (slang)","Ce film de science-fiction était vachement bien réalisé, les effets spéciaux m'ont époustouflé.","This sci-fi movie was really well made; the special effects blew me away."],["taureau","bull","Le torero est entré dans l'arène, prêt à affronter le puissant taureau noir sous les acclamations.","The bullfighter entered the arena, ready to face the powerful black bull to cheers."],["navette","shuttle","La compagnie aérienne propose une navette gratuite qui relie directement le terminal au centre-ville.","The airline offers a free shuttle that connects the terminal directly to the city center."],["poils","hairs (body or animal)","Ce chien perd énormément de poils sur le canapé pendant la période de mue printanière.","This dog sheds a massive amount of hair on the sofa during the spring shedding season."],["subi","suffered / undergone","Le bâtiment historique a subi de graves dommages à cause du terrible tremblement de terre.","The historic building suffered severe damage because of the terrible earthquake."],["baraque","shack / house (slang)","Il a acheté une vieille baraque en ruine à la campagne qu'il compte entièrement rénover.","He bought an old ruined shack in the countryside that he plans to completely renovate."],["filet","net / fillet","Le pêcheur a réparé son filet déchiré avant de repartir en mer pour la pêche matinale.","The fisherman repaired his torn net before heading back out to sea for the morning catch."],["planque","hideout / easy job (slang)","Les policiers ont découvert la planque secrète des voleurs où était entreposé l'argent dérobé.","The police discovered the thieves' secret hideout where the stolen money was stored."],["gré","will / liking","Tu devras participer à cette réunion importante demain, que cela soit de ton gré ou de force.","You will have to attend this important meeting tomorrow, whether you like it or not."],["gênant","embarrassing / awkward","Son discours interminable est devenu vraiment gênant lorsque les invités ont commencé à partir.","His endless speech became really awkward when the guests started to leave."],["ravissante","lovely / delightful","Ta fille portait une robe véritablement ravissante lors de la cérémonie de remise des diplômes.","Your daughter wore a truly lovely dress during the graduation ceremony."],["épuisé","exhausted / sold out","Les billets pour le concert de cette pop-star internationale ont été épuisés en moins d'une heure.","The tickets for this international pop star's concert were sold out in less than an hour."],["raccroche","hangs up","Si mon patron me crie encore dessus au téléphone, je te jure que je raccroche immédiatement.","If my boss yells at me on the phone again, I swear I'm hanging up immediately."],["poignée","handful / handle","J'ai ajouté une petite poignée d'amandes effilées à la préparation du gâteau pour le croquant.","I added a small handful of sliced almonds to the cake batter for crunch."],["pan","bang / piece / section","Un pan entier de la falaise s'est effondré dans la mer à la suite des récentes tempêtes hivernales.","An entire section of the cliff collapsed into the sea following the recent winter storms."],["menottes","handcuffs","L'officier de police a immédiatement passé les menottes au suspect afin d'éviter toute tentative de fuite.","The police officer immediately put handcuffs on the suspect to prevent any escape attempt."],["môme","kid (slang)","Quand j'étais môme, je passais toutes mes vacances d'été chez mes grands-parents à la ferme.","When I was a kid, I spent all my summer holidays at my grandparents' farm."],["svp","please (S'il vous plaît)","Pourriez-vous m'envoyer le compte rendu de la réunion par e-mail avant ce soir, svp ?","Could you please send me the meeting minutes by email before tonight?"]];

let cards=[...ALL], idx=0, flipped=false;
let frVoice=null, playing=false, playTimer=null;
const PLAY_DELAY=2500;

function loadVoices(){
  const v=window.speechSynthesis.getVoices();
  frVoice=v.find(x=>x.lang==='fr-FR')||v.find(x=>x.lang.startsWith('fr'))||null;
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=loadVoices;loadVoices();}

function speakText(text,onDone){
  if(!window.speechSynthesis){onDone&&onDone();return;}
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='fr-FR';utt.rate=0.85;utt.pitch=1.0;
  if(frVoice)utt.voice=frVoice;
  let fired=false;
  const done=()=>{if(!fired){fired=true;onDone&&onDone();}};
  utt.onend=done;
  utt.onerror=done;
  window.speechSynthesis.speak(utt);
}

function speakCurrent(e){
  e&&e.stopPropagation();
  if(!cards[idx])return;
  const btn=document.getElementById('speakBtn'),lbl=document.getElementById('speakLabel');
  btn.classList.add('speaking');lbl.textContent='Speaking…';
  speakText(cards[idx][0],()=>{
    if(!btn.classList.contains('speaking'))return;
    speakText(cards[idx][2],()=>{btn.classList.remove('speaking');lbl.textContent='Pronounce';});
  });
}

function filterCards(){
  const q=document.getElementById('searchBox').value.trim().toLowerCase();
  stopPlay();
  if(!q){cards=[...ALL];document.getElementById('searchCount').textContent='';}
  else{
    cards=ALL.filter(c=>c[0].toLowerCase().includes(q)||c[1].toLowerCase().includes(q));
    document.getElementById('searchCount').textContent=cards.length+' card'+(cards.length!==1?'s':'')+' matched';
  }
  idx=0;showCard();
}

function shuffle(){
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  idx=0;stopPlay();showCard();
}
function restart(){cards=[...ALL];document.getElementById('searchBox').value='';document.getElementById('searchCount').textContent='';idx=0;stopPlay();showCard();}

function showCard(){
  if(!cards.length){
    document.getElementById('card').innerHTML='<div class="side-tag">No results</div><div style="color:#888;font-size:15px">Try a different search</div>';
    document.getElementById('prog').style.width='0%';
    document.getElementById('counter').textContent='';
    return;
  }
  flipped=false;
  const c=cards[idx];
  document.getElementById('card').className='card';
  document.getElementById('sideTag').textContent='French · Front';
  document.getElementById('frontView').style.display='';
  document.getElementById('backView').style.display='none';
  document.getElementById('fWord').textContent=c[0];
  document.getElementById('fSentence').textContent=c[2];
  document.getElementById('speakLabel').textContent='Pronounce';
  document.getElementById('speakBtn').classList.remove('speaking');
  document.getElementById('counter').textContent=(idx+1)+' of '+cards.length;
  document.getElementById('prog').style.width=Math.round((idx/(cards.length-1||1))*100)+'%';
}

function showBack(){
  if(!cards[idx])return;
  flipped=true;
  const c=cards[idx];
  document.getElementById('card').className='card back';
  document.getElementById('sideTag').textContent='English · Back';
  document.getElementById('frontView').style.display='none';
  document.getElementById('backView').style.display='';
  document.getElementById('bTranslation').textContent=c[1];
  document.getElementById('bSentenceEn').textContent=c[3];
}

function flip(){
  if(!cards[idx])return;
  if(!flipped){showBack();}else{showCard();}
}

function prevCard(){stopPlay();if(idx>0){idx--;showCard();}}
function nextCard(){stopPlay();if(idx<cards.length-1){idx++;showCard();}}
function togglePlay(){if(playing){stopPlay();}else{startPlay();}}

function startPlay(){
  playing=true;
  document.getElementById('playBtn').textContent='■ Stop';
  document.getElementById('playBtn').classList.add('active');
  playStep();
}

function playStep(){
  if(!playing)return;
  showCard();
  document.getElementById('playInfo').textContent='Playing '+(idx+1)+' of '+cards.length+'…';
  // speak word, then sentence, then flip to back, then advance
  speakText(cards[idx][0],()=>{
    if(!playing)return;
    speakText(cards[idx][2],()=>{
      if(!playing)return;
      playTimer=setTimeout(()=>{
        if(!playing)return;
        showBack();
        playTimer=setTimeout(()=>{
          if(!playing)return;
          if(idx<cards.length-1){idx++;playStep();}
          else{stopPlay();document.getElementById('playInfo').textContent='Done — all '+cards.length+' cards played.';}
        },PLAY_DELAY);
      },400);
    });
  });
}

function stopPlay(){
  playing=false;clearTimeout(playTimer);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('playBtn').textContent='▶ Play All';
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playInfo').textContent='';
}

showCard();
</script>
